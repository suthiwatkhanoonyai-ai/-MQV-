<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Smart Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 12px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;border-radius:6px;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.status-good{color:green;font-weight:bold;}
.status-bad{color:red;font-weight:bold;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title"></h2>

<label id="l1"></label>
<input type="text" id="product">

<label id="l2"></label>
<input type="number" id="aq">

<label id="l3"></label>
<input type="number" id="sq">

<label id="l4"></label>
<input type="number" id="sp">

<button onclick="calculate()" id="calcBtn"></button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

</div>

<script>

let chart;
let lang="th";
let lastKey=null;
let analysisIndex={good:0,bad:0};

const TEXT={
th:{
title:"การวิเคราะห์ส่วนต่างปริมาณวัตถุดิบ (MQV)",
product:"ชื่อผลิตภัณฑ์",
aq:"ปริมาณจริง (AQ)",
sq:"ปริมาณมาตรฐาน (SQ)",
sp:"ราคามาตรฐาน (SP)",
calc:"คำนวณ",
good:"พอใจ",
bad:"ไม่พอใจ"
},
en:{
title:"Material Quantity Variance (MQV)",
product:"Product",
aq:"Actual Quantity (AQ)",
sq:"Standard Quantity (SQ)",
sp:"Standard Price (SP)",
calc:"Calculate",
good:"Favorable",
bad:"Unfavorable"
}
};

function applyLanguage(){
title.innerText=TEXT[lang].title;
l1.innerText=TEXT[lang].product;
l2.innerText=TEXT[lang].aq;
l3.innerText=TEXT[lang].sq;
l4.innerText=TEXT[lang].sp;
calcBtn.innerText=TEXT[lang].calc;
}

function toggleLang(){
lang=lang==="th"?"en":"th";
applyLanguage();
}

/* ENTER ไปช่องถัดไป */
const inputs=["product","aq","sq","sp"];
inputs.forEach((id,index)=>{
document.getElementById(id).addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
if(index<inputs.length-1){
document.getElementById(inputs[index+1]).focus();
}else{
calculate();
}
}
});
});

function calculate(){

const p=product.value.trim();
const aqVal=parseFloat(aq.value);
const sqVal=parseFloat(sq.value);
const spVal=parseFloat(sp.value);

if(!p||isNaN(aqVal)||isNaN(sqVal)||isNaN(spVal)) return;

const key=p+"-"+aqVal+"-"+sqVal+"-"+spVal;

if(key===lastKey){
return; // ไม่เปลี่ยนคำอธิบายถ้าค่าเดิม
}

lastKey=key;

const mqv=(aqVal-sqVal)*spVal;
renderResult({p,aq:aqVal,sq:sqVal,sp:spVal,mqv});
}

function generateAnalysis(record){

const {p,aq,sq,mqv}=record;
const percent = sq!==0 ? ((aq-sq)/sq)*100 : 0;
const absPercent=Math.abs(percent).toFixed(2);

/* ชุดข้อความหมุนเวียน */
const goodTH=[
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบต่ำกว่ามาตรฐาน ${absPercent}% สะท้อนถึงการควบคุมต้นทุนที่มีประสิทธิภาพ`,
`${p} แสดงถึงการบริหารทรัพยากรอย่างเหมาะสม โดยมีความเบี่ยงเบนเชิงบวก ${absPercent}%`,
`กระบวนการผลิตของ ${p} มีประสิทธิผล การใช้วัตถุดิบต่ำกว่าที่กำหนด ${absPercent}%`
];

const badTH=[
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบสูงกว่ามาตรฐาน ${absPercent}% สะท้อนถึงความไม่มีประสิทธิภาพด้านต้นทุน`,
`${p} มีความเบี่ยงเบนเชิงลบ ${absPercent}% อาจเกิดจากของเสียหรือมาตรฐานไม่เหมาะสม`,
`การใช้วัตถุดิบของ ${p} สูงเกิน ${absPercent}% ซึ่งอาจกระทบกำไรขั้นต้น`
];

const goodEN=[
`Product ${p} used ${absPercent}% less material than standard, reflecting effective cost control.`,
`${p} demonstrates favorable variance of ${absPercent}% with efficient resource use.`,
`Operational efficiency of ${p} improved with ${absPercent}% lower usage than expected.`
];

const badEN=[
`Product ${p} consumed ${absPercent}% more material than standard, indicating inefficiency.`,
`${p} shows an unfavorable variance of ${absPercent}% possibly due to waste.`,
`Material usage for ${p} exceeded standard by ${absPercent}%, affecting profitability.`
];

if(mqv>0){
let text = lang==="th"
? badTH[analysisIndex.bad++ % badTH.length]
: badEN[analysisIndex.bad++ % badEN.length];

return `<span class="status-bad">${TEXT[lang].bad}</span><br><br>${text}`;
}
else if(mqv<0){
let text = lang==="th"
? goodTH[analysisIndex.good++ % goodTH.length]
: goodEN[analysisIndex.good++ % goodEN.length];

return `<span class="status-good">${TEXT[lang].good}</span><br><br>${text}`;
}
else{
return `<span class="status-good">${TEXT[lang].good}</span><br><br>
${lang==="th"
? `การใช้วัตถุดิบเป็นไปตามมาตรฐานที่กำหนด`
: `Material usage aligns exactly with standard.`}`;
}
}

function renderResult(record){

output.innerHTML=`
AQ = ${record.aq}<br>
SQ = ${record.sq}<br>
SP = ${record.sp}<br><br>
(AQ - SQ) × SP = <b>${record.mqv.toFixed(2)}</b><br><br>
${generateAnalysis(record)}
`;

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['AQ','SQ'],
datasets:[{
data:[record.aq,record.sq],
backgroundColor:['#007acc','#99ccff']
}]
}
});
}

applyLanguage();

</script>
</body>
</html>
