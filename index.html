<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title">การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)</h2>

<label id="l1">ชื่อผลิตภัณฑ์</label>
<input type="text" id="product">

<label id="l2">ปริมาณจริงที่ใช้ (AQ)</label>
<input type="number" id="aq">

<label id="l3">ปริมาณมาตรฐาน (SQ)</label>
<input type="number" id="sq">

<label id="l4">ราคามาตรฐาน (SP)</label>
<input type="number" id="sp">

<label id="l5">หน่วยนับ</label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn">คำนวณ</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle">ประวัติการคำนวณ</h3>
<table id="historyTable">
<tr><th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th></tr>
</table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];
let lastSaved=null;

// ---------- ENTER NAVIGATION ----------
const inputs=["product","aq","sq","sp","unit"];
inputs.forEach((id,index)=>{
    document.getElementById(id).addEventListener("keydown",function(e){
        if(e.key==="Enter"){
            e.preventDefault();
            if(index<inputs.length-1){
                document.getElementById(inputs[index+1]).focus();
            }else{
                calculate();
            }
        }
    });
});

// ---------- LANGUAGE ----------
function toggleLang(){
    lang=lang==="th"?"en":"th";

    document.getElementById("title").innerText=
    lang==="th"?
    "การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)":
    "Material Quantity Variance (MQV) Calculator";

    document.getElementById("l1").innerText=lang==="th"?"ชื่อผลิตภัณฑ์":"Product Name";
    document.getElementById("l2").innerText=lang==="th"?"ปริมาณจริงที่ใช้ (AQ)":"Actual Quantity (AQ)";
    document.getElementById("l3").innerText=lang==="th"?"ปริมาณมาตรฐาน (SQ)":"Standard Quantity (SQ)";
    document.getElementById("l4").innerText=lang==="th"?"ราคามาตรฐาน (SP)":"Standard Price (SP)";
    document.getElementById("l5").innerText=lang==="th"?"หน่วยนับ":"Unit";
    document.getElementById("calcBtn").innerText=lang==="th"?"คำนวณ":"Calculate";
    document.getElementById("historyTitle").innerText=lang==="th"?"ประวัติการคำนวณ":"Calculation History";
}

// ---------- CALCULATION ----------
function calculate(save=true){

const p=document.getElementById("product").value;
const aq=parseFloat(document.getElementById("aq").value);
const sq=parseFloat(document.getElementById("sq").value);
const sp=parseFloat(document.getElementById("sp").value);
const unit=document.getElementById("unit").value;

if(!p || isNaN(aq)||isNaN(sq)||isNaN(sp)) return;

const mqv=(aq-sq)*sp;

// ----- วิเคราะห์แบบสุ่มให้แตกต่างกัน -----
const unfavorableReasons=[
"ของเสียในกระบวนการผลิตสูง",
"การควบคุมวัตถุดิบไม่เข้มงวด",
"คุณภาพวัตถุดิบต่ำกว่ามาตรฐาน",
"พนักงานยังขาดความชำนาญ",
"เครื่องจักรทำงานไม่มีประสิทธิภาพ"
];

const recommendations=[
"ควรตรวจสอบขั้นตอนการผลิตอย่างละเอียด",
"เพิ่มการฝึกอบรมพนักงาน",
"ทบทวนการกำหนด Standard Quantity",
"ตรวจสอบประสิทธิภาพเครื่องจักร",
"จัดทำระบบควบคุมภายในเพิ่มเติม"
];

function random(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

let status,analysis;

if(mqv>0){
status=lang==="th"?"ไม่พึงพอใจ":"Unfavorable";
analysis=`
<b>${lang==="th"?"ผลลัพธ์":"Result"}:</b> ${status}<br><br>
${lang==="th"?
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบมากกว่ามาตรฐาน ส่งผลให้ต้นทุนเพิ่มขึ้น ${mqv.toFixed(2)} บาท 
สาเหตุที่เป็นไปได้คือ ${random(unfavorableReasons)} 
คำแนะนำ: ${random(recommendations)}`
:
`Product ${p} consumed more material than standard, increasing cost by ${mqv.toFixed(2)}.
Possible cause: ${random(unfavorableReasons)}.
Recommendation: ${random(recommendations)}`
}`;
}else if(mqv<0){
status=lang==="th"?"พึงพอใจ":"Favorable";
analysis=`
<b>${lang==="th"?"ผลลัพธ์":"Result"}:</b> ${status}<br><br>
${lang==="th"?
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบต่ำกว่ามาตรฐาน ประหยัดต้นทุน ${Math.abs(mqv).toFixed(2)} บาท แสดงถึงประสิทธิภาพที่ดี`
:
`Product ${p} used less material than standard, saving ${Math.abs(mqv).toFixed(2)}. Shows good efficiency.`
}`;
}else{
status=lang==="th"?"เป็นไปตามมาตรฐาน":"On Standard";
analysis=status;
}

// ----- อธิบายสูตร -----
let formula=`
<b>${lang==="th"?"ตัวแปร":"Variables"}:</b><br>
AQ = ${aq}<br>
SQ = ${sq}<br>
SP = ${sp}<br><br>

<b>${lang==="th"?"สูตร":"Formula"}:</b> (AQ - SQ) × SP<br>
= (${aq} - ${sq}) × ${sp}<br>
= <b>${mqv.toFixed(2)}</b><br><br>
`;

document.getElementById("output").innerHTML=formula+analysis;

// ----- กราฟ -----
if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['AQ','SQ'],
datasets:[{label:'Quantity',data:[aq,sq],backgroundColor:['#007acc','#99ccff']}]
}
});

// ----- บันทึกเฉพาะเมื่อข้อมูลใหม่ -----
const currentData=JSON.stringify({p,aq,sq,sp,unit});
if(save && currentData!==lastSaved){
saveHistory(p,aq,sq,sp,mqv);
lastSaved=currentData;
}

}

// ---------- HISTORY ----------
function saveHistory(p,aq,sq,sp,mqv){
const record={p,aq,sq,sp,mqv};
historyData.push(record);
let row=document.getElementById("historyTable").insertRow();
row.insertCell(0).innerText=p;
row.insertCell(1).innerText=aq;
row.insertCell(2).innerText=sq;
row.insertCell(3).innerText=sp;
row.insertCell(4).innerText=mqv.toFixed(2);
let cell=row.insertCell(5);
let btn=document.createElement("button");
btn.innerText="View";
btn.className="view-btn";
btn.onclick=function(){ loadHistory(record); };
cell.appendChild(btn);
}

function loadHistory(record){
document.getElementById("product").value=record.p;
document.getElementById("aq").value=record.aq;
document.getElementById("sq").value=record.sq;
document.getElementById("sp").value=record.sp;
calculate(false); // ไม่บันทึกซ้ำ
}

// ---------- EXPORT ----------
function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
doc.text(document.getElementById("output").innerText,10,10);
doc.save("MQV_Result.pdf");
}

function exportExcel(){
let table=document.getElementById("historyTable");
let wb=XLSX.utils.table_to_book(table,{sheet:"MQV"});
XLSX.writeFile(wb,"MQV_History.xlsx");
}

</script>
</body>
</html>
