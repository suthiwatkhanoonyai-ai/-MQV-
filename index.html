<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;border-radius:6px;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;color:white;border:none;padding:5px;border-radius:4px;}
.status-good{color:green;font-weight:bold;}
.status-bad{color:red;font-weight:bold;}
.status-mid{color:orange;font-weight:bold;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title"></h2>

<label id="l1"></label>
<input type="text" id="product">

<label id="l2"></label>
<input type="number" id="aq">

<label id="l3"></label>
<input type="number" id="sq">

<label id="l4"></label>
<input type="number" id="sp">

<label id="l5"></label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn"></button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle"></h3>
<table id="historyTable">
<tr>
<th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th>
</tr>
</table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];
let currentRecord=null;

const TEXT={
th:{
title:"การวิเคราะห์ส่วนต่างปริมาณวัตถุดิบ (MQV)",
product:"ชื่อผลิตภัณฑ์",
aq:"ปริมาณจริงที่ใช้ (AQ)",
sq:"ปริมาณมาตรฐาน (SQ)",
sp:"ราคามาตรฐาน (SP)",
unit:"หน่วยนับ",
calc:"คำนวณ",
history:"ประวัติการคำนวณ"
},
en:{
title:"Material Quantity Variance (MQV) Analysis",
product:"Product Name",
aq:"Actual Quantity (AQ)",
sq:"Standard Quantity (SQ)",
sp:"Standard Price (SP)",
unit:"Unit",
calc:"Calculate",
history:"Calculation History"
}
};

function applyLanguage(){
document.getElementById("title").innerText=TEXT[lang].title;
document.getElementById("l1").innerText=TEXT[lang].product;
document.getElementById("l2").innerText=TEXT[lang].aq;
document.getElementById("l3").innerText=TEXT[lang].sq;
document.getElementById("l4").innerText=TEXT[lang].sp;
document.getElementById("l5").innerText=TEXT[lang].unit;
document.getElementById("calcBtn").innerText=TEXT[lang].calc;
document.getElementById("historyTitle").innerText=TEXT[lang].history;
}

function toggleLang(){
lang=lang==="th"?"en":"th";
applyLanguage();
if(currentRecord) renderResult(currentRecord,false);
}

function calculate(){

const p=product.value;
const aqVal=parseFloat(aq.value);
const sqVal=parseFloat(sq.value);
const spVal=parseFloat(sp.value);
const unitVal=unit.value;

if(!p||isNaN(aqVal)||isNaN(sqVal)||isNaN(spVal)) return;

const mqv=(aqVal-sqVal)*spVal;
const record={p,aq:aqVal,sq:sqVal,sp:spVal,mqv,unit:unitVal};
currentRecord=record;

renderResult(record,true);
}

function getAnalysis(record){

const {p, aq, sq, mqv} = record;
const diffPercent = ((aq - sq) / sq) * 100;
let analysis="";
let statusClass="";

if(mqv > 0){

    if(diffPercent > 15){
        statusClass="status-bad";
        analysis=`
<span class="${statusClass}">ผลลัพธ์: ไม่พึงพอใจ (Critical)</span><br><br>
ผลิตภัณฑ์ ${p} มีการใช้วัตถุดิบสูงกว่ามาตรฐาน ${diffPercent.toFixed(2)}%
สะท้อนถึงความผิดปกติระดับกระบวนการ เช่น การสูญเสียในสายการผลิต
การกำหนดมาตรฐานไม่สอดคล้องกับสภาพจริง หรือเครื่องจักรเสื่อมประสิทธิภาพ
<br><br>
ข้อเสนอแนะ: ควรทำ Process Audit วิเคราะห์ของเสียทุกจุด
ทบทวน Standard Quantity และประเมินประสิทธิภาพเครื่องจักรอย่างเร่งด่วน
`;
    } else {
        statusClass="status-mid";
        analysis=`
<span class="${statusClass}">ผลลัพธ์: ไม่พึงพอใจ (Moderate)</span><br><br>
ผลิตภัณฑ์ ${p} ใช้วัตถุดิบเกินมาตรฐาน ${diffPercent.toFixed(2)}%
อาจเกิดจากความคลาดเคลื่อนในการปฏิบัติงานหรือการควบคุมหน้างานยังไม่สม่ำเสมอ
<br><br>
ข้อเสนอแนะ: เพิ่มจุดควบคุมก่อนเข้าสายการผลิต
และติดตามแนวโน้มความเบี่ยงเบนอย่างต่อเนื่อง
`;
    }

}
else if(mqv < 0){
    statusClass="status-good";
    analysis=`
<span class="${statusClass}">ผลลัพธ์: พึงพอใจ (Favorable)</span><br><br>
ผลิตภัณฑ์ ${p} ใช้วัตถุดิบต่ำกว่ามาตรฐาน ${Math.abs(diffPercent).toFixed(2)}%
สะท้อนถึงประสิทธิภาพการผลิตที่ดีขึ้นและการควบคุมของเสียได้อย่างมีประสิทธิผล
<br><br>
ข้อเสนอแนะ: ควรวิเคราะห์แนวปฏิบัติที่ดีนี้
และพิจารณาปรับปรุง Standard Quantity ให้สอดคล้องกับประสิทธิภาพใหม่
`;
}
else{
    analysis=`<span class="status-mid">ผลลัพธ์: เป็นไปตามมาตรฐาน</span>`;
}

return analysis;
}

function renderResult(record,save){

const {p,aq,sq,sp,mqv}=record;

let formula=`
<b>Variables:</b><br>
AQ = ${aq}<br>
SQ = ${sq}<br>
SP = ${sp}<br><br>
<b>Formula:</b> (AQ - SQ) × SP<br>
= (${aq} - ${sq}) × ${sp}<br>
= <b>${mqv.toFixed(2)}</b><br><br>
`;

output.innerHTML=formula+getAnalysis(record);

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['AQ','SQ'],
datasets:[{
data:[aq,sq],
backgroundColor:['#007acc','#99ccff']
}]
}
});

if(save) saveHistory(record);
}

function saveHistory(record){
historyData.push(record);
let row=historyTable.insertRow();
row.insertCell(0).innerText=record.p;
row.insertCell(1).innerText=record.aq;
row.insertCell(2).innerText=record.sq;
row.insertCell(3).innerText=record.sp;
row.insertCell(4).innerText=record.mqv.toFixed(2);
let cell=row.insertCell(5);
let btn=document.createElement("button");
btn.innerText="View";
btn.className="view-btn";
btn.onclick=function(){
currentRecord=record;
renderResult(record,false);
};
cell.appendChild(btn);
}

function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
doc.text(output.innerText,10,10);
doc.save("MQV_Result.pdf");
}

function exportExcel(){
let wb=XLSX.utils.table_to_book(historyTable,{sheet:"MQV"});
XLSX.writeFile(wb,"MQV_History.xlsx");
}

applyLanguage();

</script>
</body>
</html>
