<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0 12px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title"></h2>

<label id="l1"></label>
<input type="text" id="product">

<label id="l2"></label>
<input type="number" id="aq">

<label id="l3"></label>
<input type="number" id="sq">

<label id="l4"></label>
<input type="number" id="sp">

<label id="l5"></label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn"></button>
<button onclick="exportPDF()" id="pdfBtn"></button>
<button onclick="exportExcel()" id="excelBtn"></button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle"></h3>
<table id="historyTable">
<tr>
<th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th>
</tr>
</table>
</div>

</div>

<script>
let lang="th";
let chart;
let historyData=[];
let lastRecord=null;

/* ---------- LANGUAGE ---------- */

function setLanguage(){
    document.getElementById("title").innerText=
    lang==="th"?"การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)":
    "Material Quantity Variance (MQV) Calculator";

    document.getElementById("l1").innerText=lang==="th"?"ชื่อผลิตภัณฑ์":"Product Name";
    document.getElementById("l2").innerText=lang==="th"?"ปริมาณจริงที่ใช้ (AQ)":"Actual Quantity (AQ)";
    document.getElementById("l3").innerText=lang==="th"?"ปริมาณมาตรฐาน (SQ)":"Standard Quantity (SQ)";
    document.getElementById("l4").innerText=lang==="th"?"ราคามาตรฐาน (SP)":"Standard Price (SP)";
    document.getElementById("l5").innerText=lang==="th"?"หน่วยนับ":"Unit";
    document.getElementById("calcBtn").innerText=lang==="th"?"คำนวณ":"Calculate";
    document.getElementById("pdfBtn").innerText="Export PDF";
    document.getElementById("excelBtn").innerText="Export Excel";
    document.getElementById("historyTitle").innerText=
    lang==="th"?"ประวัติการคำนวณ":"Calculation History";
}
function toggleLang(){lang=lang==="th"?"en":"th";setLanguage();}
setLanguage();

/* ---------- ENTER NAVIGATION ---------- */

const inputs=["product","aq","sq","sp","unit"];
inputs.forEach((id,index)=>{
    document.getElementById(id).addEventListener("keydown",function(e){
        if(e.key==="Enter"){
            e.preventDefault();
            if(index<inputs.length-1){
                document.getElementById(inputs[index+1]).focus();
            }else{
                calculate();
            }
        }
    });
});

/* ---------- CALCULATION ---------- */

function calculate(){
    const p=document.getElementById("product").value;
    const aq=parseFloat(document.getElementById("aq").value);
    const sq=parseFloat(document.getElementById("sq").value);
    const sp=parseFloat(document.getElementById("sp").value);
    const unit=document.getElementById("unit").value;

    if(!p||isNaN(aq)||isNaN(sq)||isNaN(sp)) return;

    const mqv=(aq-sq)*sp;

    const record=JSON.stringify({p,aq,sq,sp,unit});
    if(record!==lastRecord){
        saveHistory(p,aq,sq,sp,mqv,unit);
        lastRecord=record;
    }

    showResult(p,aq,sq,sp,unit,mqv);
    drawChart(aq,sq);
}

/* ---------- RESULT + ANALYSIS ---------- */

function showResult(p,aq,sq,sp,unit,mqv){

    let satisfaction,analysis,recommendation="";

    if(mqv>0){
        satisfaction=lang==="th"?"ไม่พึงพอใจ":"Unsatisfactory";
        analysis=lang==="th"?
        `การผลิต ${p} ใช้วัตถุดิบเกินมาตรฐาน ${Math.abs(aq-sq)} ${unit} ส่งผลให้ต้นทุนเพิ่มขึ้น ${mqv.toFixed(2)} บาท`:
        `Production of ${p} used ${Math.abs(aq-sq)} ${unit} more than standard, increasing cost by ${mqv.toFixed(2)}.`;

        recommendation=lang==="th"?
        `สาเหตุที่เป็นไปได้: ของเสียสูง, การควบคุมกระบวนการผลิตไม่ดี, วัตถุดิบคุณภาพไม่สม่ำเสมอ
คำแนะนำ: ควบคุมของเสีย วิเคราะห์ขั้นตอนผลิต และทบทวนมาตรฐานการใช้วัตถุดิบ`:
        `Possible causes: high waste, inefficient process, inconsistent material quality.
Recommendation: improve waste control and review production standards.`;
    }else{
        satisfaction=lang==="th"?"พึงพอใจ":"Satisfactory";
        analysis=lang==="th"?
        `การผลิต ${p} ควบคุมการใช้วัตถุดิบได้ดี ผลต่างเท่ากับ ${mqv.toFixed(2)} บาท`:
        `Production of ${p} efficiently controlled material usage. Variance equals ${mqv.toFixed(2)}.`;
    }

    document.getElementById("output").innerHTML=`
<b>${lang==="th"?"คำอธิบายตัวแปร":"Variable Explanation"}</b><br>
AQ = ${aq} (${lang==="th"?"ปริมาณจริง":"Actual Quantity"})<br>
SQ = ${sq} (${lang==="th"?"ปริมาณมาตรฐาน":"Standard Quantity"})<br>
SP = ${sp} (${lang==="th"?"ราคามาตรฐาน":"Standard Price"})<br><br>

<b>${lang==="th"?"สูตร":"Formula"}</b><br>
MQV = (AQ − SQ) × SP<br><br>

<b>${lang==="th"?"แทนค่า":"Substitution"}</b><br>
= (${aq} − ${sq}) × ${sp}<br>
= <b>${mqv.toFixed(2)}</b><br><br>

<b>${lang==="th"?"ผลการประเมิน":"Evaluation"}</b>: ${satisfaction}<br><br>
${analysis}<br><br>
${recommendation}
`;
}

/* ---------- CHART ---------- */

function drawChart(aq,sq){
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{
            labels:['AQ','SQ'],
            datasets:[{
                label:'Comparison',
                data:[aq,sq],
                backgroundColor:['#007acc','#99ccff']
            }]
        }
    });
}

/* ---------- HISTORY ---------- */

function saveHistory(p,aq,sq,sp,mqv,unit){
    const table=document.getElementById("historyTable");
    const row=table.insertRow();
    row.insertCell(0).innerText=p;
    row.insertCell(1).innerText=aq;
    row.insertCell(2).innerText=sq;
    row.insertCell(3).innerText=sp;
    row.insertCell(4).innerText=mqv.toFixed(2);

    const viewCell=row.insertCell(5);
    const btn=document.createElement("button");
    btn.innerText="View";
    btn.className="view-btn";
    btn.onclick=function(){
        document.getElementById("product").value=p;
        document.getElementById("aq").value=aq;
        document.getElementById("sq").value=sq;
        document.getElementById("sp").value=sp;
        document.getElementById("unit").value=unit;
        showResult(p,aq,sq,sp,unit,mqv);
        drawChart(aq,sq);
    };
    viewCell.appendChild(btn);
}

/* ---------- EXPORT ---------- */

function exportPDF(){
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF();
    doc.text(document.getElementById("output").innerText,10,10);
    doc.save("MQV_Result.pdf");
}
function exportExcel(){
    let table=document.getElementById("historyTable");
    let wb=XLSX.utils.table_to_book(table,{sheet:"MQV"});
    XLSX.writeFile(wb,"MQV_History.xlsx");
}

</script>
</body>
</html>
