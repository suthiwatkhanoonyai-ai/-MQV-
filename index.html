<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0 12px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;color:white;border:none;padding:5px;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title">การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)</h2>

<label id="l1">ชื่อผลิตภัณฑ์</label>
<input type="text" id="product">

<label id="l2">ปริมาณจริงที่ใช้ (AQ)</label>
<input type="number" id="aq">

<label id="l3">ปริมาณมาตรฐาน (SQ)</label>
<input type="number" id="sq">

<label id="l4">ราคามาตรฐาน (SP)</label>
<input type="number" id="sp">

<label id="l5">หน่วยนับ</label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn">คำนวณ</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle">ประวัติการคำนวณ</h3>
<table id="historyTable">
<tr>
<th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th>
</tr>
</table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];
let lastSaved=null;

const texts={
th:{
title:"การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)",
calc:"คำนวณ",
history:"ประวัติการคำนวณ",
satisfy:"ผลลัพธ์อยู่ในเกณฑ์ที่พึงพอใจ",
unsatisfy:"ผลลัพธ์ไม่เป็นที่พึงพอใจ"
},
en:{
title:"Material Quantity Variance (MQV) Calculator",
calc:"Calculate",
history:"Calculation History",
satisfy:"Result is Satisfactory",
unsatisfy:"Result is Unsatisfactory"
}
};

function toggleLang(){
lang=lang==="th"?"en":"th";
document.getElementById("title").innerText=texts[lang].title;
document.getElementById("calcBtn").innerText=texts[lang].calc;
document.getElementById("historyTitle").innerText=texts[lang].history;
}

document.querySelectorAll("input").forEach((el,i,arr)=>{
el.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
if(i<arr.length-1){arr[i+1].focus();}
else{calculate();}
}
});
});

function calculate(){

const p=product.value;
const aq=parseFloat(aqInput.value||aq.value);
const sq=parseFloat(sqInput.value||sq.value);
const sp=parseFloat(spInput.value||sp.value);
const unit=unitInput.value||unit.value;

if(!p||isNaN(aq)||isNaN(sq)||isNaN(sp)) return;

const mqv=(aq-sq)*sp;

let statusText,analysisText;

if(mqv<=0){
statusText=texts[lang].satisfy;
analysisText=`
${statusText}<br><br>
การใช้วัตถุดิบของ ${p} อยู่ในระดับควบคุมได้ดี 
ปริมาณจริง (${aq} ${unit}) ไม่เกินมาตรฐาน (${sq} ${unit}) 
สะท้อนถึงประสิทธิภาพการผลิต การควบคุมของเสีย และการวางแผนที่เหมาะสม 
ควรรักษามาตรฐานการควบคุมนี้และติดตามแนวโน้มอย่างต่อเนื่อง`;
}else{
statusText=texts[lang].unsatisfy;
analysisText=`
${statusText}<br><br>
การผลิต ${p} ใช้วัตถุดิบเกินมาตรฐาน 
ปริมาณจริง (${aq} ${unit}) สูงกว่ามาตรฐาน (${sq} ${unit}) 
ทำให้ต้นทุนเพิ่มขึ้น ${mqv.toFixed(2)} 

สาเหตุที่เป็นไปได้:
- ของเสียจากกระบวนการผลิตสูง
- คุณภาพวัตถุดิบไม่สม่ำเสมอ
- การตั้งค่าเครื่องจักรไม่เหมาะสม
- พนักงานขาดความชำนาญเฉพาะด้านของผลิตภัณฑ์ ${p}

คำแนะนำ:
- วิเคราะห์อัตราการสูญเสียเฉพาะสายการผลิตของ ${p}
- ตรวจสอบคุณภาพวัตถุดิบก่อนเข้าไลน์ผลิต
- ปรับปรุงมาตรฐานการควบคุมคุณภาพ
- ฝึกอบรมพนักงานเฉพาะขั้นตอนที่เกี่ยวข้อง`;
}

let detail=`
<b>ตัวแปร:</b><br>
AQ = ปริมาณจริงที่ใช้ (${aq})<br>
SQ = ปริมาณมาตรฐาน (${sq})<br>
SP = ราคามาตรฐาน (${sp})<br><br>

<b>สูตร:</b> MQV = (AQ - SQ) × SP<br>
แทนค่า: (${aq} - ${sq}) × ${sp}<br>
ผลลัพธ์ = <b>${mqv.toFixed(2)}</b><br><br>
${analysisText}
`;

output.innerHTML=detail;

if(!lastSaved||JSON.stringify(lastSaved)!==JSON.stringify({p,aq,sq,sp})){
saveHistory(p,aq,sq,sp,mqv,unit);
lastSaved={p,aq,sq,sp};
}

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{labels:['AQ','SQ'],
datasets:[{data:[aq,sq],backgroundColor:['#007acc','#99ccff']}]
}
});
}

function saveHistory(p,aq,sq,sp,mqv,unit){
let record={p,aq,sq,sp,mqv,unit};
historyData.push(record);

let row=historyTable.insertRow();
row.insertCell(0).innerText=p;
row.insertCell(1).innerText=aq;
row.insertCell(2).innerText=sq;
row.insertCell(3).innerText=sp;
row.insertCell(4).innerText=mqv.toFixed(2);
let cell=row.insertCell(5);
let btn=document.createElement("button");
btn.innerText="View";
btn.className="view-btn";
btn.onclick=function(){
product.value=record.p;
aq.value=record.aq;
sq.value=record.sq;
sp.value=record.sp;
unit.value=record.unit;
calculate();
};
cell.appendChild(btn);
}

function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
doc.text(output.innerText,10,10);
doc.save("MQV_Result.pdf");
}

function exportExcel(){
let wb=XLSX.utils.table_to_book(historyTable,{sheet:"MQV"});
XLSX.writeFile(wb,"MQV_History.xlsx");
}

</script>
</body>
</html>
