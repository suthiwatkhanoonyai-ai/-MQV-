<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Smart Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1100px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 12px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;border-radius:6px;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;color:white;border:none;padding:5px;border-radius:4px;}
.status-good{color:green;font-weight:bold;}
.status-bad{color:red;font-weight:bold;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title"></h2>

<label id="l1"></label>
<input type="text" id="product">

<label id="l2"></label>
<input type="number" id="aq">

<label id="l3"></label>
<input type="number" id="sq">

<label id="l4"></label>
<input type="number" id="sp">

<label id="l5"></label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn"></button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle"></h3>
<table id="historyTable"></table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];
let lastKey=null;
let lastAnalysis="";
let currentRecord=null;

const TEXT={
th:{
title:"การวิเคราะห์ส่วนต่างปริมาณวัตถุดิบ (MQV)",
product:"ชื่อผลิตภัณฑ์",
aq:"ปริมาณจริง (AQ)",
sq:"ปริมาณมาตรฐาน (SQ)",
sp:"ราคามาตรฐาน (SP)",
unit:"หน่วย",
calc:"คำนวณ",
history:"ประวัติการคำนวณ",
headers:["สินค้า","AQ","SQ","SP","MQV","ดูข้อมูล"],
satisfy:"พอใจ",
unsatisfy:"ไม่พอใจ"
},
en:{
title:"Material Quantity Variance (MQV)",
product:"Product",
aq:"Actual Quantity (AQ)",
sq:"Standard Quantity (SQ)",
sp:"Standard Price (SP)",
unit:"Unit",
calc:"Calculate",
history:"Calculation History",
headers:["Product","AQ","SQ","SP","MQV","View"],
satisfy:"Favorable",
unsatisfy:"Unfavorable"
}
};

function applyLanguage(){
title.innerText=TEXT[lang].title;
l1.innerText=TEXT[lang].product;
l2.innerText=TEXT[lang].aq;
l3.innerText=TEXT[lang].sq;
l4.innerText=TEXT[lang].sp;
l5.innerText=TEXT[lang].unit;
calcBtn.innerText=TEXT[lang].calc;
historyTitle.innerText=TEXT[lang].history;
renderHistory();
if(currentRecord){
renderResult(currentRecord,false);
}
}

function toggleLang(){
lang=lang==="th"?"en":"th";
applyLanguage();
}

/* ENTER NEXT */

const inputs=["product","aq","sq","sp","unit"];
inputs.forEach((id,index)=>{
document.getElementById(id).addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
if(index<inputs.length-1){
document.getElementById(inputs[index+1]).focus();
}else{
calculate();
}
}
});
});

/* CALCULATE */

function calculate(){

const p=product.value.trim();
const aqVal=parseFloat(aq.value);
const sqVal=parseFloat(sq.value);
const spVal=parseFloat(sp.value);

if(!p||isNaN(aqVal)||isNaN(sqVal)||isNaN(spVal)) return;

const key=p+"-"+aqVal+"-"+sqVal+"-"+spVal;

if(key===lastKey){
renderResult(currentRecord,false);
return;
}

const mqv=(aqVal-sqVal)*spVal;

const record={p,aq:aqVal,sq:sqVal,sp:spVal,mqv};
currentRecord=record;
lastKey=key;

lastAnalysis=generateAnalysis(record);

historyData.push(record);

renderResult(record,false);
renderHistory();
}

/* SMART ANALYSIS */

function generateAnalysis(record){

const {p,aq,sq,mqv}=record;
const diffPercent = sq!==0 ? ((aq-sq)/sq)*100 : 0;
const absPercent=Math.abs(diffPercent).toFixed(2);

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

const badTH=[
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบเกินมาตรฐาน ${absPercent}% สะท้อนถึงการควบคุมต้นทุนที่ยังไม่รัดกุม`,
`การใช้วัตถุดิบของ ${p} สูงกว่ามาตรฐาน ${absPercent}% อาจเกิดจากของเสียหรือกระบวนการคลาดเคลื่อน`,
`${p} มีต้นทุนวัตถุดิบเกิน ${absPercent}% ควรตรวจสอบขั้นตอนการผลิต`,
`พบความสูญเสียของวัตถุดิบใน ${p} ${absPercent}% แนะนำให้วิเคราะห์สาเหตุเชิงลึก`
];

const goodTH=[
`ผลิตภัณฑ์ ${p} ใช้วัตถุดิบต่ำกว่ามาตรฐาน ${absPercent}% แสดงถึงประสิทธิภาพที่ดี`,
`${p} ควบคุมต้นทุนได้ดี ลดการใช้วัตถุดิบ ${absPercent}%`,
`การผลิต ${p} มีการใช้ทรัพยากรอย่างคุ้มค่า ต่ำกว่ามาตรฐาน ${absPercent}%`,
`${p} แสดงถึงการบริหารต้นทุนที่มีประสิทธิภาพ ลดความสูญเสียลง ${absPercent}%`
];

const equalTH=[
`${p} ใช้วัตถุดิบตรงตามมาตรฐานที่กำหนด`,
`ไม่พบความคลาดเคลื่อนของวัตถุดิบใน ${p}`,
`${p} มีประสิทธิภาพตามเกณฑ์ที่วางไว้`
];

const badEN=[
`Product ${p} exceeded material usage by ${absPercent}% indicating weak cost control.`,
`${p} shows ${absPercent}% overconsumption possibly due to inefficiency.`,
`Material variance of ${p} negatively impacts margin by ${absPercent}%.`,
`${p} requires process review due to ${absPercent}% excess usage.`
];

const goodEN=[
`Product ${p} reduced material usage by ${absPercent}% showing strong efficiency.`,
`${p} demonstrates cost optimization with ${absPercent}% savings.`,
`Material control for ${p} is effective with ${absPercent}% improvement.`,
`${p} achieved favorable variance of ${absPercent}%.`
];

const equalEN=[
`${p} material usage meets defined standards exactly.`,
`No variance detected for ${p}.`,
`${p} shows stable production performance.`
];

if(mqv>0){
return `<span class="status-bad">${TEXT[lang].unsatisfy}</span><br><br>`+
(lang==="th"?random(badTH):random(badEN));
}
else if(mqv<0){
return `<span class="status-good">${TEXT[lang].satisfy}</span><br><br>`+
(lang==="th"?random(goodTH):random(goodEN));
}
else{
return `<span class="status-good">${TEXT[lang].satisfy}</span><br><br>`+
(lang==="th"?random(equalTH):random(equalEN));
}

}

/* RENDER */

function renderResult(record){

const {aq,sq,sp,mqv}=record;

output.innerHTML=`
AQ = ${aq}<br>
SQ = ${sq}<br>
SP = ${sp}<br><br>
(AQ - SQ) × SP = <b>${mqv.toFixed(2)}</b><br><br>
${lastAnalysis}
`;

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['AQ','SQ'],
datasets:[{data:[aq,sq],backgroundColor:['#007acc','#99ccff']}]
}
});
}

/* HISTORY */

function renderHistory(){
let table=historyTable;
table.innerHTML="";
let header=table.insertRow();
TEXT[lang].headers.forEach(h=>{
let cell=header.insertCell();
cell.innerText=h;
});
historyData.forEach(r=>{
let row=table.insertRow();
row.insertCell().innerText=r.p;
row.insertCell().innerText=r.aq;
row.insertCell().innerText=r.sq;
row.insertCell().innerText=r.sp;
row.insertCell().innerText=r.mqv.toFixed(2);
let btnCell=row.insertCell();
let btn=document.createElement
