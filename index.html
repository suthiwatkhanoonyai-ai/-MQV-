<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Expert Final Pro + History</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --primary: #005f99; --bg: #f0f4f8; --card: white; --danger: #d32f2f; --success: #2e7d32; --history: #607d8b; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
    .container { max-width: 1000px; margin: auto; background: var(--card); padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--primary); border-bottom: 3px solid #e6f2ff; padding-bottom: 20px; margin-top: 0; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    @media (max-width: 600px) { .input-group { grid-template-columns: 1fr; } }
    label { font-weight: bold; font-size: 0.95em; color: #444; }
    input { width: 100%; padding: 12px; border: 1.5px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; margin-top: 8px; }
    input:focus { border-color: var(--primary); outline: none; background: #faffff; box-shadow: 0 0 10px rgba(0,95,153,0.15); }
    #calcBtn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; margin-top: 10px; }
    #calcBtn:hover { background: #004066; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .lang-btn { float: right; background: #555; color: white; border: none; border-radius: 25px; padding: 10px 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .result-section { background: #f8fbff; padding: 30px; border-radius: 15px; margin-top: 30px; display: none; border: 1px solid #e0e8f0; animation: slideUp 0.5s ease-out; }
    .analysis-card { background: white; padding: 35px; border-radius: 12px; border-left: 10px solid var(--primary); margin-top: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); line-height: 1.9; }
    .status-badge { display: inline-block; padding: 10px 25px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; font-size: 1.1em; }
    .bad { background: #ffebee; color: var(--danger); }
    .good { background: #e8f5e9; color: var(--success); }
    
    /* History Styles */
    .history-section { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 30px; }
    .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .history-table th { background: var(--history); color: white; padding: 15px; text-align: center; }
    .history-table td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
    .view-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
    .view-btn:hover { background: #004066; }
    
    canvas { margin-top: 40px; max-height: 400px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
    <button class="lang-btn" onclick="toggleLang()">TH / EN</button>
    <h2 id="title">ระบบวิเคราะห์ MQV และบันทึกประวัติ</h2>

    <div class="input-group">
        <div><label id="l1"></label><input type="text" id="product"></div>
        <div><label id="l5"></label><input type="text" id="unit"></div>
        <div><label id="l2"></label><input type="number" id="aq"></div>
        <div><label id="l3"></label><input type="number" id="sq"></div>
        <div><label id="l4"></label><input type="number" id="sp"></div>
    </div>

    <button onclick="calculate()" id="calcBtn"></button>

    <div class="result-section" id="output"></div>
    <canvas id="chart"></canvas>

    <div class="history-section">
        <h3 id="hTitle">ประวัติการวิเคราะห์ (Analysis History)</h3>
        <div style="overflow-x: auto;">
            <table class="history-table">
                <thead>
                    <tr id="hHeaders"></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let chart;
let lang = "th";
let historyData = [];
let currentRecord = null;

const TEXT = {
    th: {
        title: "ระบบวิเคราะห์ MQV เชิงลึกและบันทึกประวัติ",
        product: "ชื่อผลิตภัณฑ์/วัสดุ", aq: "ปริมาณที่ใช้จริง (AQ)", sq: "ปริมาณมาตรฐาน (SQ)", sp: "ราคามาตรฐาน (SP)", unit: "หน่วยนับ",
        calc: "วิเคราะห์และบันทึกข้อมูล", badTitle: "⚠️ ไม่พอใจ: ต้นทุนสูงเกินกำหนด (Unfavorable)", goodTitle: "✅ พอใจ: ควบคุมต้นทุนได้ดีเยี่ยม (Favorable)",
        hTitle: "ประวัติการวิเคราะห์ล่าสุด", hHeaders: ["สินค้า", "ใช้จริง", "เป้าหมาย", "ราคา", "ส่วนต่าง", "ย้อนดู"],
        sec1: "1. สรุปภาพรวม:", sec2: "2. ผลกระทบทางการเงิน:", sec3: "3. สาเหตุเชิงลึก:", sec4: "4. ข้อเสนอแนะ:",
        badReasons: [
            "พบเศษวัสดุเหลือทิ้ง (Scrap) ในกระบวนการผลิตสูงเกินมาตรฐาน ซึ่งมักเกิดจากความบกพร่องของเครื่องจักรหรือการตั้งค่าที่ไม่แม่นยำ",
            "วัตถุดิบล็อตนี้มีคุณภาพต่ำกว่าเกณฑ์ปกติ ทำให้พนักงานต้องใช้ปริมาณมากขึ้นเพื่อรักษาระดับคุณภาพของสินค้า",
            "เกิดความผิดพลาดในการจัดการทรัพยากรหน้างาน (Material Handling) ทำให้เกิดการรั่วไหลหรือสูญเสียระหว่างการลำเลียง",
            "ค่ามาตรฐาน (Standard) ล้าสมัย ไม่สอดคล้องกับสภาพเครื่องจักรในปัจจุบัน ทำให้ตัวเลขที่คำนวณได้ดูสูงกว่าความเป็นจริง"
        ],
        badAdvices: ["ควรตรวจสอบเครื่องจักรทันที", "เจรจากับ Supplier เรื่องคุณภาพ", "ฝึกอบรมพนักงานเพิ่ม", "ทบทวนค่ามาตรฐานใหม่"]
    },
    en: {
        title: "Deep MQV Analysis & History System",
        product: "Product Name", aq: "Actual Qty (AQ)", sq: "Standard Qty (SQ)", sp: "Std Price (SP)", unit: "Unit",
        calc: "Analyze & Record Data", badTitle: "⚠️ Unfavorable: Cost Overrun", goodTitle: "✅ Favorable: Cost Savings",
        hTitle: "Recent Analysis History", hHeaders: ["Product", "Actual", "Std", "Price", "Var", "View"],
        sec1: "1. Summary:", sec2: "2. Financial Impact:", sec3: "3. Root Causes:", sec4: "4. Action Plan:",
        badReasons: [
            "High production scrap detected, likely due to machine errors or inaccurate calibration settings.",
            "Sub-standard material quality forced higher consumption to maintain final product integrity.",
            "Material handling errors led to significant waste or leakage during the production flow.",
            "Obsolete standard settings (SQ) no longer reflect current operational capacities."
        ],
        badAdvices: ["Audit machinery now", "Discuss quality with supplier", "Re-train operators", "Revise standard settings"]
    }
};

// Enter Key Navigation
const inputs = ["product", "unit", "aq", "sq", "sp"];
inputs.forEach((id, i) => {
    document.getElementById(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            if (i < inputs.length - 1) document.getElementById(inputs[i+1]).focus();
            else calculate();
        }
    });
});

function applyUI() {
    const t = TEXT[lang];
    document.getElementById("title").innerText = t.title;
    document.getElementById("l1").innerText = t.product;
    document.getElementById("l2").innerText = t.aq;
    document.getElementById("l3").innerText = t.sq;
    document.getElementById("l4").innerText = t.sp;
    document.getElementById("l5").innerText = t.unit;
    document.getElementById("calcBtn").innerText = t.calc;
    document.getElementById("hTitle").innerText = t.hTitle;
    document.getElementById("hHeaders").innerHTML = t.hHeaders.map(h => `<th>${h}</th>`).join('');
    renderHistoryTable();
}

function toggleLang() {
    lang = (lang === "th") ? "en" : "th";
    applyUI();
    if(currentRecord) renderResult(currentRecord);
}

function calculate() {
    const p = document.getElementById("product").value;
    const aq = parseFloat(document.getElementById("aq").value);
    const sq = parseFloat(document.getElementById("sq").value);
    const sp = parseFloat(document.getElementById("sp").value);
    const u = document.getElementById("unit").value || (lang==='th'?'หน่วย':'Unit');

    if (!p || isNaN(aq) || isNaN(sq) || isNaN(sp)) return;

    const mqv = (aq - sq) * sp;
    
    currentRecord = { 
        p, aq, sq, sp, mqv, unit: u, 
        rIdx: Math.floor(Math.random() * 4), 
        aIdx: Math.floor(Math.random() * 4),
        timestamp: new Date().toLocaleTimeString()
    };
    
    // บันทึกประวัติเฉพาะตอนกดปุ่มคำนวณใหม่เท่านั้น
    historyData.unshift({...currentRecord});
    if(historyData.length > 10) historyData.pop(); // เก็บแค่ 10 รายการล่าสุด
    
    renderResult(currentRecord);
    renderHistoryTable();
}

function renderResult(r) {
    const out = document.getElementById("output");
    out.style.display = "block";
    const t = TEXT[lang];
    const diff = Math.abs(r.aq - r.sq).toFixed(2);
    const mqvVal = Math.abs(r.mqv).toLocaleString(undefined, {minimumFractionDigits: 2});

    let content = "";
    if (r.mqv > 0) {
        content = `<div class="status-badge bad">${t.badTitle}</div>
            <div class="analysis-card">
                <b>${t.sec1}</b> ${r.p} ใช้เกินไป <b>${diff} ${r.unit}</b><br><br>
                <b>${t.sec2}</b> ต้นทุนเสียหายเพิ่มขึ้น <b>${mqvVal} ${lang==='th'?'บาท':'Units'}</b> ซึ่งน่าเป็นห่วงต่อกำไร<br><br>
                <b>${t.sec3}</b> ${t.badReasons[r.rIdx]}<br><br>
                <b>${t.sec4}</b> ${t.badAdvices[r.aIdx]}
            </div>`;
    } else {
        content = `<div class="status-badge good">${t.goodTitle}</div>
            <div class="analysis-card">
                <b>${t.sec1}</b> ${r.p} ประหยัดได้ <b>${diff} ${r.unit}</b><br><br>
                <b>${t.sec2}</b> ลดต้นทุนได้ถึง <b>${mqvVal} ${lang==='th'?'บาท':'Units'}</b> ช่วยเพิ่มกำไรอย่างมาก<br><br>
                <b>${t.sec3}</b> การจัดการมีประสิทธิภาพสูงมาก หรือวัตถุดิบมีคุณภาพดีเยี่ยม<br><br>
                <b>${t.sec4}</b> บันทึกเป็น Best Practice เพื่อใช้กับกะอื่น
            </div>`;
    }

    out.innerHTML = `<div><b>ผลลัพธ์:</b> (${r.aq} - ${r.sq}) × ${r.sp} = <span style="font-size:1.4em; color:${r.mqv>0?'var(--danger)':'var(--success)'}"><b>${r.mqv.toFixed(2)}</b></span></div>${content}`;

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: lang==='th'?['ใช้จริง', 'มาตรฐาน']:['Actual', 'Standard'],
            datasets: [{ data: [r.aq, r.sq], backgroundColor: ['#005f99', '#99ccff'], borderRadius: 8 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

function renderHistoryTable() {
    const body = document.getElementById("historyBody");
    body.innerHTML = historyData.map((item, index) => `
        <tr>
            <td>${item.p}</td>
            <td>${item.aq}</td>
            <td>${item.sq}</td>
            <td>${item.sp}</td>
            <td style="color:${item.mqv > 0 ? 'red' : 'green'}"><b>${item.mqv.toFixed(2)}</b></td>
            <td><button class="view-btn" onclick="viewPastRecord(${index})">${lang==='th'?'ดู':'View'}</button></td>
        </tr>
    `).join('');
}

// ฟังก์ชันย้อนดู (ไม่บันทึกลงประวัติซ้ำ)
function viewPastRecord(index) {
    currentRecord = historyData[index];
    renderResult(currentRecord);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

applyUI();
</script>
</body>
</html>
