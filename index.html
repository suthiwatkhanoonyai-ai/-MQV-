<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Expert Final Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --primary: #005f99; --bg: #f0f4f8; --card: white; --danger: #d32f2f; --success: #2e7d32; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
    .container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--primary); border-bottom: 2px solid #e6f2ff; padding-bottom: 15px; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    @media (max-width: 600px) { .input-group { grid-template-columns: 1fr; } }
    label { font-weight: bold; font-size: 0.9em; color: #555; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
    input:focus { border-color: var(--primary); outline: none; background: #faffff; box-shadow: 0 0 8px rgba(0,95,153,0.2); }
    button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; margin-top: 10px; }
    button:hover { background: #004066; transform: translateY(-2px); }
    .lang-btn { width: auto; float: right; background: #444; color: white; border-radius: 20px; padding: 8px 20px; font-size: 14px; }
    .result-section { background: #eef6ff; padding: 25px; border-radius: 12px; margin-top: 25px; display: none; line-height: 1.8; animation: fadeIn 0.5s ease-in; }
    .analysis-card { background: white; padding: 30px; border-radius: 8px; border-left: 8px solid var(--primary); margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .status-badge { display: inline-block; padding: 8px 20px; border-radius: 30px; font-weight: bold; margin-bottom: 15px; font-size: 1em; }
    .bad { background: #ffebee; color: var(--danger); }
    .good { background: #e8f5e9; color: var(--success); }
    canvas { margin-top: 30px; max-height: 350px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
    <button class="lang-btn" onclick="toggleLang()">TH / EN</button>
    <h2 id="title">ระบบวิเคราะห์ต้นทุน MQV</h2>

    <div class="input-group">
        <div><label id="l1"></label><input type="text" id="product"></div>
        <div><label id="l5"></label><input type="text" id="unit"></div>
        <div><label id="l2"></label><input type="number" id="aq"></div>
        <div><label id="l3"></label><input type="number" id="sq"></div>
        <div><label id="l4"></label><input type="number" id="sp"></div>
    </div>

    <button onclick="calculate()" id="calcBtn"></button>

    <div class="result-section" id="output"></div>
    <canvas id="chart"></canvas>
</div>

<script>
let chart;
let lang = "th";
let currentRecord = null;

const TEXT = {
    th: {
        title: "ระบบวิเคราะห์ส่วนต่างปริมาณวัสดุเชิงลึก (MQV Expert)",
        product: "ชื่อผลิตภัณฑ์/สินค้า", aq: "ปริมาณที่ใช้จริง (AQ)", sq: "ปริมาณมาตรฐาน (SQ)", sp: "ราคามาตรฐาน (SP)", unit: "หน่วยนับ",
        calc: "คำนวณและประมวลผลเชิงลึก", badTitle: "⚠️ ตรวจพบความเบี่ยงเบนของต้นทุนสูง (Unfavorable)", goodTitle: "✅ การควบคุมต้นทุนมีประสิทธิภาพสูง (Favorable)",
        badReasons: [
            "มีการสูญเสียในสายการผลิต (Production Scraps) ที่สูงเกินกว่าค่าควบคุมมาตรฐานอย่างมีนัยสำคัญ ซึ่งอาจสืบเนื่องมาจากพนักงานขาดความชำนาญเฉพาะทางในขั้นตอนการคัดแยกวัตถุดิบ หรือการตั้งค่าเครื่องจักรที่คลาดเคลื่อนจากแผนวิศวกรรมการผลิต",
            "วัตถุดิบที่รับเข้ามาในล็อตนี้อาจมีความผิดปกติของคุณภาพ (Material Defect) ทำให้ในกระบวนการผลิตต้องมีการนำวัตถุดิบมาใช้ซ้ำหรือเติมส่วนประกอบมากกว่าเดิม เพื่อรักษามาตรฐานของผลิตภัณฑ์ปลายทางไม่ให้เสียราคาตลาด",
            "เกิดจากปัญหาคอขวดในกระบวนการผลิต (Process Bottleneck) ที่ทำให้เครื่องจักรทำงานไม่ต่อเนื่อง ส่งผลให้มีการสูญเสียวัตถุดิบในระหว่างการ Start-up หรือ Restart เครื่องจักรซ้ำๆ ตลอดทั้งวันการทำงาน",
            "โครงสร้างมาตรฐานเดิม (Standard Specification) อาจล้าสมัยและไม่สอดคล้องกับเทคโนโลยีเครื่องจักรปัจจุบัน หรือมีการปรับเปลี่ยนสูตรการผลิต (BOM) แต่ไม่ได้ปรับปรุงค่ามาตรฐานให้ทันสมัยตามหน้างานจริง"
        ],
        badAdvices: [
            "ควรจัดทีมเข้าตรวจสอบ (Floor Audit) เพื่อวัดอัตราการเกิดของเสียรายชั่วโมงในทันที พร้อมทั้งตรวจสอบ Log ของเครื่องจักรเพื่อหาจุดบกพร่องทางเทคนิค และลดอัตราการรั่วไหลของต้นทุนที่อาจลุกลามต่อเนื่องในกะการทำงานถัดไป",
            "แนะนำให้ฝ่ายจัดซื้อและฝ่ายควบคุมคุณภาพ (QC) ดำเนินการตรวจสอบคุณภาพวัตถุดิบ (Incoming QC) จาก Supplier รายปัจจุบันอย่างเข้มงวด และหากพบว่าคุณภาพต่ำกว่าเกณฑ์ ต้องมีการทำรายงานเคลมค่าเสียหายจากต้นทุนที่เพิ่มขึ้นนี้",
            "ควรเพิ่มมาตรการการฝึกอบรมพนักงานหน้างาน (Standard Operating Procedure) เพื่อเน้นย้ำความสำคัญของการใช้ทรัพยากรอย่างคุ้มค่า และการติดตั้งระบบเซนเซอร์แจ้งเตือนเมื่อพบการสูญเสียวัตถุดิบที่ผิดปกติ",
            "ฝ่ายวางแผนควรเก็บข้อมูลย้อนหลัง (Historical Data) เพื่อทำการปรับปรุงมาตรฐาน (Standard Revision) ใหม่ให้สอดคล้องกับขีดความสามารถของทรัพยากรที่มีอยู่จริงในปัจจุบัน เพื่อความแม่นยำในการวิเคราะห์งบประมาณ"
        ]
    },
    en: {
        title: "Deep Material Quantity Variance Analysis (MQV Expert)",
        product: "Product/Material Name", aq: "Actual Quantity (AQ)", sq: "Standard Quantity (SQ)", sp: "Standard Price (SP)", unit: "Unit",
        calc: "Calculate & Deep Process Analysis", badTitle: "⚠️ High Cost Deviation Detected (Unfavorable)", goodTitle: "✅ High Efficiency Cost Control (Favorable)",
        badReasons: [
            "Significant production scrap rates have exceeded the standard control threshold, likely caused by a lack of specialized operational skills in material sorting or machine settings drifting from engineering design specifications.",
            "The current raw material batch shows signs of quality defects, forcing the production line to re-process or consume additional units to maintain the required output quality and avoid downstream rejection costs.",
            "Process bottlenecks have caused intermittent production flow, leading to excessive material wastage during frequent machine startups and restarts throughout the operational shift.",
            "The existing standard specifications (Standard Quantity) appear obsolete and no longer align with current machinery capabilities or modified Bill of Materials (BOM) that haven't been updated in the system."
        ],
        badAdvices: [
            "Immediate floor audits are required to monitor hourly waste rates and analyze machine logs for technical glitches to prevent further financial leakage and stabilize production costs for the next operational shift.",
            "Procurement and QC teams must conduct a rigorous audit of incoming raw materials from the current supplier. If sub-standard quality is confirmed, a formal damage claim should be initiated for the added operational costs.",
            "Implement mandatory SOP training for line operators to emphasize resource optimization and introduce automated sensor alerts to notify supervisors when material loss spikes beyond acceptable levels.",
            "The planning department should perform a thorough review of historical usage data to revise standards, ensuring they reflect current operational realities for more accurate budgetary analysis."
        ]
    }
};

// Enter Navigation
const inputs = ["product", "unit", "aq", "sq", "sp"];
inputs.forEach((id, i) => {
    document.getElementById(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            if (i < inputs.length - 1) document.getElementById(inputs[i+1]).focus();
            else calculate();
        }
    });
});

function toggleLang() {
    lang = lang === "th" ? "en" : "th";
    applyUI();
    if(currentRecord) render();
}

function applyUI() {
    const t = TEXT[lang];
    document.getElementById("title").innerText = t.title;
    document.getElementById("l1").innerText = t.product;
    document.getElementById("l2").innerText = t.aq;
    document.getElementById("l3").innerText = t.sq;
    document.getElementById("l4").innerText = t.sp;
    document.getElementById("l5").innerText = t.unit;
    document.getElementById("calcBtn").innerText = t.calc;
}

function calculate() {
    const p = document.getElementById("product").value;
    const aq = parseFloat(document.getElementById("aq").value);
    const sq = parseFloat(document.getElementById("sq").value);
    const sp = parseFloat(document.getElementById("sp").value);
    const u = document.getElementById("unit").value || (lang==='th'?'หน่วย':'Unit');

    if (!p || isNaN(aq) || isNaN(sq) || isNaN(sp)) return;

    const mqv = (aq - sq) * sp;
    // สุ่มดัชนีใหม่ทุกครั้งที่กดคำนวณ เพื่อให้ข้อความเปลี่ยนจริง
    currentRecord = { p, aq, sq, sp, mqv, unit: u, rIdx: Math.floor(Math.random()*4), aIdx: Math.floor(Math.random()*4) };
    render();
}

function render() {
    const out = document.getElementById("output");
    out.style.display = "block";
    const t = TEXT[lang];
    const r = currentRecord;
    const diff = Math.abs(r.aq - r.sq).toFixed(2);
    const mqvVal = Math.abs(r.mqv).toLocaleString(undefined, {minimumFractionDigits: 2});
    const percent = r.sq !== 0 ? ((Math.abs(r.aq - r.sq) / r.sq) * 100).toFixed(2) : 0;

    let content = "";
    if (r.mqv > 0) {
        content = `
            <div class="status-badge bad">${t.badTitle}</div>
            <div class="analysis-card">
                <b>1. บทสรุปการปฏิบัติงาน:</b> พบว่าผลิตภัณฑ์ <b>"${r.p}"</b> มีการใช้ทรัพยากรจริงสูงกว่าเป้าหมายถึง <b>${diff} ${r.unit}</b> (เบี่ยงเบนทางลบ ${percent}%) ซึ่งถือเป็นความเสี่ยงต่อต้นทุนรวม<br><br>
                <b>2. การวิเคราะห์ผลกระทบด้านการเงินอย่างละเอียด:</b> ความสิ้นเปลืองในครั้งนี้ทำให้บริษัทเกิดต้นทุนส่วนเกิน (Extra Cost) ทันทีเป็นจำนวนเงิน <b>${mqvVal} ${lang==='th'?'บาท':'Units'}</b> ซึ่งตัวเลขนี้จะส่งผลโดยตรงต่อการลดลงของกำไรสุทธิในงวดบัญชีนี้ และหากไม่ได้รับการแก้ไข อาจส่งผลให้งบประมาณการผลิตปลายปีไม่เป็นไปตามเป้าหมาย (Budget Variance Overflow)<br><br>
                <b>3. การวิเคราะห์สาเหตุเชิงลึก:</b> ${t.badReasons[r.rIdx]}<br><br>
                <b>4. ข้อเสนอแนะเชิงกลยุทธ์:</b> ${t.badAdvices[r.aIdx]}
            </div>`;
    } else {
        content = `
            <div class="status-badge good">${t.goodTitle}</div>
            <div class="analysis-card">
                <b>1. บทสรุปการปฏิบัติงาน:</b> ยอดเยี่ยม! ผลิตภัณฑ์ <b>"${r.p}"</b> สามารถควบคุมปริมาณการใช้ได้ต่ำกว่าเป้าหมายถึง <b>${diff} ${r.unit}</b> (ประสิทธิภาพสูงขึ้น ${percent}%)<br><br>
                <b>2. การวิเคราะห์ทางการเงิน:</b> การลดการใช้ทรัพยากรครั้งนี้ช่วยประหยัดต้นทุนไปได้ถึง <b>${mqvVal} ${lang==='th'?'บาท':'Units'}</b> ซึ่งเสริมความแข็งแกร่งให้แก่กระแสเงินสดและเพิ่มอัตรากำไรขั้นต้น (GP) ของโปรเจกต์นี้ได้อย่างชัดเจน<br><br>
                <b>3. สาเหตุแห่งความสำเร็จ:</b> เกิดจากความแม่นยำในกระบวนการทำงาน พนักงานมีความเข้าใจในมาตรฐานการใช้ทรัพยากรเป็นอย่างดี และวัตถุดิบที่ใช้มีคุณภาพสูงทำให้ไม่มีของเสียเกิดขึ้น<br><br>
                <b>4. ข้อแนะนำ:</b> ควรบันทึกเป็นกรณีศึกษาต้นแบบ (Best Practice Case) เพื่อขยายผลความสำเร็จนี้ไปยังสายการผลิตอื่นๆ ต่อไป
            </div>`;
    }

    out.innerHTML = `<div><b>สูตร:</b> (AQ - SQ) × SP = <span style="font-size:1.3em; color:${r.mqv>0?'var(--danger)':'var(--success)'}"><b>${r.mqv.toFixed(2)}</b></span></div>${content}`;

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: lang==='th'?['ใช้จริง (AQ)', 'มาตรฐาน (SQ)']:['Actual', 'Standard'],
            datasets: [{ data: [r.aq, r.sq], backgroundColor: ['#005f99', '#99ccff'], borderRadius: 5 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

applyUI();
</script>
</body>
</html>
