<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Smart Multi-Lang</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --p: #005f99; --s: #eef6ff; --g: #2e7d32; --r: #d32f2f; }
    body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; color: #333; transition: 0.3s; }
    .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    h2 { color: var(--p); margin: 0; }
    .lang-btn { padding: 8px 15px; background: #666; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    label { font-weight: bold; font-size: 14px; color: #555; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    input:focus { border-color: var(--p); outline: none; box-shadow: 0 0 5px rgba(0,95,153,0.2); }
    #calcBtn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 17px; margin-top: 15px; }
    .analysis-card { background: var(--s); padding: 20px; border-radius: 12px; margin-top: 25px; display: none; border-left: 6px solid var(--p); line-height: 1.8; }
    .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
    .bad { background: #ffdada; color: var(--r); }
    .good { background: #d4edda; color: var(--g); }
    canvas { margin-top: 25px; max-height: 300px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2 id="txt-title">ระบบวิเคราะห์ MQV</h2>
        <button class="lang-btn" onclick="toggleLang()">TH / EN</button>
    </div>

    <div class="grid">
        <div><label id="lbl-product"></label><input type="text" id="product" class="nav-input"></div>
        <div><label id="lbl-unit"></label><input type="text" id="unit" class="nav-input"></div>
        <div><label id="lbl-aq"></label><input type="number" id="aq" class="nav-input"></div>
        <div><label id="lbl-sq"></label><input type="number" id="sq" class="nav-input"></div>
        <div><label id="lbl-sp"></label><input type="number" id="sp" class="nav-input"></div>
    </div>

    <button onclick="calculate()" id="calcBtn"></button>

    <div class="analysis-card" id="output"></div>
    <canvas id="chart"></canvas>
</div>

<script>
let chart;
let currentLang = 'th';
let lastRecord = null;

const i18n = {
    th: {
        title: "ระบบวิเคราะห์ MQV อัจฉริยะ",
        product: "ชื่อผลิตภัณฑ์",
        unit: "หน่วยนับ",
        aq: "ปริมาณจริง (AQ)",
        sq: "ปริมาณมาตรฐาน (SQ)",
        sp: "ราคามาตรฐาน (SP)",
        calc: "คำนวณและวิเคราะห์ผลลัพธ์",
        unfavorable: "⚠️ ไม่พอใจ (Unfavorable)",
        favorable: "✅ พอใจ (Favorable)",
        summary: "สรุปผล",
        impact: "ผลกระทบเงิน",
        cause: "วิเคราะห์สาเหตุที่เป็นไปได้",
        suggest: "คำแนะนำ",
        above: "เกินเป้าหมาย",
        below: "ต่ำกว่าเป้าหมาย",
        loss: "เสียโอกาส/ขาดทุน",
        save: "ประหยัดต้นทุน",
        badReasons: [
            "ความสูญเสียในกระบวนการผลิตสูงกว่าปกติ",
            "วัตถุดิบมีคุณภาพต่ำกว่ามาตรฐานทำให้เกิดของเสียมาก",
            "เครื่องจักรทำงานผิดปกติ หรือพนักงานขาดความชำนาญ",
            "มาตรฐานเดิมไม่สอดคล้องกับสภาพปัจจุบัน"
        ],
        goodReasons: [
            "พนักงานมีความเชี่ยวชาญสูงในการจัดการทรัพยากร",
            "เทคโนโลยีใหม่ช่วยลดการสูญเสียได้อย่างมาก",
            "วัตถุดิบคุณภาพดีเยี่ยมทำให้ลดการใช้ซ้ำซ้อน",
            "มีการควบคุมสภาพแวดล้อมการผลิตที่แม่นยำ"
        ]
    },
    en: {
        title: "Smart MQV Analysis System",
        product: "Product Name",
        unit: "Unit",
        aq: "Actual Quantity (AQ)",
        sq: "Standard Quantity (SQ)",
        sp: "Standard Price (SP)",
        calc: "Calculate & Analyze",
        unfavorable: "⚠️ Unfavorable Variance",
        favorable: "✅ Favorable Variance",
        summary: "Summary",
        impact: "Financial Impact",
        cause: "Probable Root Cause",
        suggest: "Recommendation",
        above: "above target",
        below: "below target",
        loss: "Loss/Extra Cost",
        save: "Cost Savings",
        badReasons: [
            "Higher than normal production waste",
            "Sub-standard raw materials causing scraps",
            "Machine malfunction or lack of operator skill",
            "Standard values are outdated for current conditions"
        ],
        goodReasons: [
            "Exceptional skill in resource management",
            "New technology significantly reduced waste",
            "Premium material quality reduced consumption",
            "Precise production environment control"
        ]
    }
};

function updateUI() {
    const t = i18n[currentLang];
    document.getElementById("txt-title").innerText = t.title;
    document.getElementById("lbl-product").innerText = t.product;
    document.getElementById("lbl-unit").innerText = t.unit;
    document.getElementById("lbl-aq").innerText = t.aq;
    document.getElementById("lbl-sq").innerText = t.sq;
    document.getElementById("lbl-sp").innerText = t.sp;
    document.getElementById("calcBtn").innerText = t.calc;
    if (lastRecord) renderResult(lastRecord);
}

function toggleLang() {
    currentLang = currentLang === 'th' ? 'en' : 'th';
    updateUI();
}

// Enter Navigation
const inputs = document.querySelectorAll('.nav-input');
inputs.forEach((input, index) => {
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (index < inputs.length - 1) inputs[index + 1].focus();
            else calculate();
        }
    });
});

function calculate() {
    const p = document.getElementById("product").value;
    const aq = parseFloat(document.getElementById("aq").value);
    const sq = parseFloat(document.getElementById("sq").value);
    const sp = parseFloat(document.getElementById("sp").value);
    const unit = document.getElementById("unit").value || (currentLang === 'th' ? 'หน่วย' : 'Unit');

    if (!p || isNaN(aq) || isNaN(sq) || isNaN(sp)) return;

    const mqv = (aq - sq) * sp;
    lastRecord = { p, aq, sq, sp, mqv, unit };
    renderResult(lastRecord);
}

function renderResult(r) {
    const out = document.getElementById("output");
    const t = i18n[currentLang];
    out.style.display = "block";
    
    const diff = Math.abs(r.aq - r.sq).toFixed(2);
    const percent = r.sq !== 0 ? ((Math.abs(r.aq - r.sq) / r.sq) * 100).toFixed(2) : 0;
    const isBad = r.mqv > 0;
    
    const getRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    out.innerHTML = `
        <div class="status-badge ${isBad ? 'bad' : 'good'}">${isBad ? t.unfavorable : t.favorable}</div>
        <div>
            <b>${t.summary}:</b> ${r.p} ${isBad ? t.above : t.below} ${diff} ${r.unit} (${percent}%)<br>
            <b>${t.impact}:</b> ${isBad ? t.loss : t.save} <b>${Math.abs(r.mqv).toLocaleString()}</b><br><br>
            <b>${t.cause}:</b> ${isBad ? getRandom(t.badReasons) : getRandom(t.goodReasons)}<br>
            <b>${t.suggest}:</b> ${isBad ? (currentLang === 'th' ? 'ตรวจสอบไลน์ผลิต' : 'Audit production line') : (currentLang === 'th' ? 'รักษามาตรฐานนี้ไว้' : 'Maintain this standard')}
        </div>
    `;
    updateChart(r);
}

function updateChart(r) {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: currentLang === 'th' ? ['ใช้จริง', 'มาตรฐาน'] : ['Actual', 'Standard'],
            datasets: [{
                data: [r.aq, r.sq],
                backgroundColor: ['#005f99', '#99ccff'],
                borderRadius: 5
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

updateUI(); // Initial build
</script>
</body>
</html>
