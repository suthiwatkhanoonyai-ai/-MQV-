<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f8ff;
    margin:0;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{ text-align:center; color:#007acc; }
input,button{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
}
button{
    background:#007acc;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{ background:#005f99; }
.lang-btn{ width:auto; float:right; }
.result,.history{
    background:#e6f2ff;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}
.view-btn{
    background:#005f99;
    padding:4px 8px;
}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title">การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)</h2>

<label id="l1">ชื่อผลิตภัณฑ์</label>
<input type="text" id="product">

<label id="l2">ปริมาณจริงที่ใช้ (AQ)</label>
<input type="number" id="aq">

<label id="l3">ปริมาณมาตรฐาน (SQ)</label>
<input type="number" id="sq">

<label id="l4">ราคามาตรฐาน (SP)</label>
<input type="number" id="sp">

<label id="l5">หน่วยนับ</label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn">คำนวณ</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle">ประวัติการคำนวณ</h3>
<table id="historyTable">
<tr>
<th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th>
</tr>
</table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];

function toggleLang(){
    lang = lang==="th"?"en":"th";

    document.getElementById("title").innerText =
    lang==="th"?
    "การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)":
    "Material Quantity Variance (MQV) Calculator";

    document.getElementById("l1").innerText = lang==="th"?"ชื่อผลิตภัณฑ์":"Product Name";
    document.getElementById("l2").innerText = lang==="th"?"ปริมาณจริงที่ใช้ (AQ)":"Actual Quantity (AQ)";
    document.getElementById("l3").innerText = lang==="th"?"ปริมาณมาตรฐาน (SQ)":"Standard Quantity (SQ)";
    document.getElementById("l4").innerText = lang==="th"?"ราคามาตรฐาน (SP)":"Standard Price (SP)";
    document.getElementById("l5").innerText = lang==="th"?"หน่วยนับ":"Unit";
    document.getElementById("calcBtn").innerText = lang==="th"?"คำนวณ":"Calculate";
    document.getElementById("historyTitle").innerText = lang==="th"?"ประวัติการคำนวณ":"Calculation History";
}

function calculate(){

    const p=document.getElementById("product").value;
    const aq=parseFloat(document.getElementById("aq").value);
    const sq=parseFloat(document.getElementById("sq").value);
    const sp=parseFloat(document.getElementById("sp").value);
    const unit=document.getElementById("unit").value;

    const mqv=(aq-sq)*sp;

    let analysis="";
    let status="";

    if(mqv>0){
        status="Unfavorable (ไม่เป็นที่พึงพอใจ)";
        analysis=`
<b>ผลการคำนวณ:</b> ${mqv.toFixed(2)} <br><br>
<b>การวิเคราะห์:</b><br>
การใช้วัตถุดิบของ ${p} สูงกว่ามาตรฐาน ทำให้ต้นทุนเพิ่มขึ้น<br>
แสดงถึงประสิทธิภาพการผลิตที่ต่ำกว่าที่กำหนด<br><br>

<b>สาเหตุที่เป็นไปได้:</b><br>
- อัตราของเสีย (Waste) สูง<br>
- เครื่องจักรขาดการบำรุงรักษา<br>
- คุณภาพวัตถุดิบต่ำ<br>
- การควบคุมภายในไม่เข้มงวด<br>
- การกำหนดมาตรฐานต่ำเกินจริง<br><br>

<b>คำแนะนำ:</b><br>
- วิเคราะห์กระบวนการผลิตและลดของเสีย<br>
- ตรวจสอบและบำรุงรักษาเครื่องจักร<br>
- ควบคุมคุณภาพวัตถุดิบ<br>
- ทบทวนการกำหนดมาตรฐานใหม่
`;
    }else if(mqv<0){
        status="Favorable (เป็นที่พึงพอใจ)";
        analysis=`
<b>ผลการคำนวณ:</b> ${mqv.toFixed(2)} <br><br>
<b>การวิเคราะห์:</b><br>
การใช้วัตถุดิบของ ${p} ต่ำกว่ามาตรฐาน<br>
สะท้อนถึงการควบคุมต้นทุนที่มีประสิทธิภาพ<br><br>

<b>ข้อควรพิจารณา:</b><br>
- ตรวจสอบว่าการประหยัดไม่กระทบคุณภาพสินค้า<br>
- ประเมินความเหมาะสมของมาตรฐานเดิม<br>
- รักษากระบวนการที่มีประสิทธิภาพนี้ต่อไป
`;
    }else{
        status="Standard Achieved";
        analysis=`
<b>ผลการคำนวณ:</b> 0 <br><br>
การใช้วัตถุดิบเป็นไปตามมาตรฐานที่กำหนด<br>
สะท้อนถึงการควบคุมการผลิตที่มีเสถียรภาพ
`;
    }

    document.getElementById("output").innerHTML=analysis;

    saveHistory(p,aq,sq,sp,mqv,unit);

    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{
            labels:['AQ','SQ'],
            datasets:[{
                label:'Quantity Comparison',
                data:[aq,sq],
                backgroundColor:['#007acc','#99ccff']
            }]
        }
    });
}

function saveHistory(p,aq,sq,sp,mqv,unit){
    const record={p,aq,sq,sp,mqv,unit};
    historyData.push(record);

    let table=document.getElementById("historyTable");
    let row=table.insertRow();

    row.insertCell(0).innerText=p;
    row.insertCell(1).innerText=aq;
    row.insertCell(2).innerText=sq;
    row.insertCell(3).innerText=sp;
    row.insertCell(4).innerText=mqv.toFixed(2);

    let viewCell=row.insertCell(5);
    let btn=document.createElement("button");
    btn.innerText="View";
    btn.className="view-btn";
    btn.onclick=function(){ loadHistory(record); };
    viewCell.appendChild(btn);
}

function loadHistory(record){
    document.getElementById("product").value=record.p;
    document.getElementById("aq").value=record.aq;
    document.getElementById("sq").value=record.sq;
    document.getElementById("sp").value=record.sp;
    document.getElementById("unit").value=record.unit;
    calculate(); // ไม่บันทึกซ้ำ
}

function exportPDF(){
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF();
    doc.text(document.getElementById("output").innerText,10,10);
    doc.save("MQV_Result.pdf");
}

function exportExcel(){
    let table=document.getElementById("historyTable");
    let wb=XLSX.utils.table_to_book(table,{sheet:"MQV"});
    XLSX.writeFile(wb,"MQV_History.xlsx");
}

</script>

</body>
</html>
