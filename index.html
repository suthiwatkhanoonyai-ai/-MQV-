<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQV Expert Final Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #005f99; --bg: #f0f4f8; --card: white; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid #e6f2ff; padding-bottom: 15px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 0.9em; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px; }
        
        /* สไตล์ตามรูปภาพที่คุณส่งมา */
        .result-section { background: #eef6ff; padding: 25px; border-radius: 12px; margin-top: 25px; display: none; line-height: 1.8; border: 1px dashed #cbd5e0; }
        .analysis-card { background: white; padding: 30px; border-radius: 8px; border-left: 8px solid var(--primary); margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 30px; font-weight: bold; margin-bottom: 15px; font-size: 1em; }
        .bad { background: #ffebee; color: var(--danger); }
        .good { background: #e8f5e9; color: var(--success); }
        
        canvas { margin-top: 30px; max-height: 350px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบวิเคราะห์ต้นทุน MQV เชิงลึก</h2>

    <div class="input-group">
        <div><label>ชื่อผลิตภัณฑ์</label><input type="text" id="product" value="เก้าอี้"></div>
        <div><label>หน่วยนับ</label><input type="text" id="unit" value="เมตร"></div>
        <div><label>ปริมาณที่ใช้จริง (AQ)</label><input type="number" id="aq" value="5600"></div>
        <div><label>ปริมาณมาตรฐาน (SQ)</label><input type="number" id="sq" value="4800"></div>
        <div><label>ราคามาตรฐาน (SP)</label><input type="number" id="sp" value="50"></div>
    </div>

    <button onclick="calculate()">คำนวณและประมวลผลเชิงลึก</button>

    <div class="result-section" id="output"></div>
    <canvas id="chart"></canvas>
</div>

<script>
let chart;

const POOL = {
    bad: {
        titles: ["⚠️ ต้นทุนสูงกว่าเป้าหมาย (Unfavorable)", "⚠️ ตรวจพบความสิ้นเปลืองวัสดุเกินเกณฑ์", "⚠️ รายงานความเบี่ยงเบนทางลบระดับวิกฤต"],
        reasons: [
            "วิเคราะห์พบความผิดปกติในการตั้งค่าเครื่องจักร (Machine Calibration) ทำให้สัดส่วนการใช้วัตถุดิบผิดเพี้ยนไปจากแผนงานที่วิศวกรออกแบบไว้ ส่งผลให้เกิดเศษวัสดุทิ้ง (Scrap) สูงกว่าค่ามาตรฐานทางบัญชี",
            "เกิดจากทักษะความชำนาญของผู้ปฏิบัติงาน (Labor Inefficiency) หรือมีการหมุนเวียนพนักงานใหม่เข้าสู่สายการผลิตโดยขาดการฝึกอบรมที่เพียงพอ ทำให้เกิดความสูญเสียในขั้นตอนคัดแยกและตัดแต่งวัสดุสะสมตลอดกะ",
            "คุณภาพวัตถุดิบจาก Supplier ในล็อตนี้มีเกรดต่ำกว่ามาตรฐาน (Sub-standard Material) ทำให้กระบวนการผลิตต้องใช้ปริมาณ Input เพิ่มขึ้นเพื่อชดเชยส่วนที่เสียไป เพื่อรักษาคุณภาพของสินค้าปลายทางให้ได้ตามสเปก",
            "พบปัญหาคอขวดในกระบวนการ (Process Bottleneck) ทำให้เครื่องจักรหยุดชะงักบ่อยครั้ง ส่งผลให้วัตถุดิบที่ค้างในระบบเกิดการเสื่อมสภาพหรือต้องถูกกำจัดทิ้งระหว่างการ Restart ระบบใหม่ซ้ำๆ"
        ],
        advices: [
            "ควรทำการวิเคราะห์ข้อมูลย้อนหลัง 3-6 เดือนเพื่อทบทวนค่ามาตรฐาน (Standard Setting) ใหม่ให้สะท้อนถึงขีดความสามารถที่แท้จริงของโรงงาน และตรวจสอบจุดรั่วไหลของเศษวัสดุหน้างานทันที",
            "เสนอให้จัดตั้งทีมตรวจสอบ (Floor Audit) เพื่อวัดอัตราการเกิดของเสียรายชั่วโมง และติดตั้งระบบเซนเซอร์แจ้งเตือนเมื่อพบการใช้วัตถุดิบเกินเกณฑ์ที่กำหนดไว้ในสูตรการผลิต (BOM)",
            "ประสานงานฝ่ายจัดซื้อเพื่อทำ Supplier Audit และพิจารณาการเคลมส่วนต่างต้นทุนที่เพิ่มขึ้นจากวัตถุดิบที่ไม่ได้คุณภาพ พร้อมทั้งหาแหล่งวัตถุดิบสำรองที่มีมาตรฐานเสถียรกว่าเดิม",
            "ดำเนินการ Re-training พนักงานหน้างานในจุดที่มีการสูญเสียสูงสุด และปรับปรุงคู่มือการปฏิบัติงาน (SOP) ให้เน้นความสำคัญของการประหยัดทรัพยากรและการลดความสูญเสียแบบลีน (Lean Manufacturing)"
        ]
    },
    good: {
        titles: ["✅ การควบคุมต้นทุนมีประสิทธิภาพสูง (Favorable)", "✅ ประสบความสำเร็จในการประหยัดทรัพยากร", "✅ รายงานประสิทธิภาพการผลิตเป็นบวก"],
        reasons: [
            "เป็นผลจากการปรับปรุงกระบวนการแบบ Lean Production ทำให้สามารถลดการสูญเสียในขั้นตอนการเตรียมวัสดุ และเพิ่มอัตราการใช้ประโยชน์จากทรัพยากร (Material Utilization) ได้สูงสุดในรอบปี",
            "ทีมปฏิบัติการมีความเชี่ยวชาญสูงและมีการควบคุมพารามิเตอร์ของเครื่องจักรได้อย่างแม่นยำสม่ำเสมอ ส่งผลให้อัตราของเสีย (Defect) เกือบเป็นศูนย์ตลอดช่วงเวลาการผลิตในงวดนี้",
            "วัตถุดิบที่จัดซื้อในล็อตนี้มีคุณภาพสูงกว่ามาตรฐานทั่วไป (Premium Grade) ทำให้กระบวนการแปรรูปทำได้ง่ายและมีการสูญเสียน้อยกว่าที่คาดการณ์ไว้ในงบประมาณต้นทุนมาตรฐาน",
            "มีการประยุกต์ใช้เทคโนโลยีใหม่ในการควบคุมระบบป้อนวัสดุอัตโนมัติ (Automated Feeding) ที่มีความละเอียดสูง ช่วยลดความคลาดเคลื่อนที่เกิดจากผู้ปฏิบัติงาน (Manual Error) ได้อย่างมีประสิทธิภาพ"
        ],
        advices: [
            "ควรบันทึกผลการดำเนินงานครั้งนี้เป็นกรณีศึกษาต้นแบบ (Best Practice) และจัดทำเป็นคู่มือมาตรฐานใหม่เพื่อขยายผลความสำเร็จนี้ไปยังสายการผลิตอื่นในองค์กร",
            "พิจารณาให้รางวัลหรือประกาศเกียรติคุณแก่ทีมงานเพื่อเป็นขวัญและกำลังใจในการรักษามาตรฐานความละเอียดรอบคอบในการทำงาน และการใช้ทรัพยากรอย่างคุ้มค่าต่อไป",
            "ฝ่ายวางแผนควรประเมินการลดค่า Standard Quantity ในระบบบัญชีต้นทุนเพื่อให้เป้าหมายในอนาคตมีความท้าทายและสะท้อนความสามารถที่พัฒนาขึ้นของทีมงาน",
            "แนะนำให้วิเคราะห์ความสัมพันธ์ระหว่างคุณภาพวัตถุดิบรายนี้กับกำไรที่เพิ่มขึ้น เพื่อใช้เป็นข้อมูลสนับสนุนในการเจรจาทำสัญญาจัดซื้อระยะยาวกับ Supplier รายปัจจุบัน"
        ]
    }
};

function calculate() {
    const p = document.getElementById("product").value;
    const aq = parseFloat(document.getElementById("aq").value);
    const sq = parseFloat(document.getElementById("sq").value);
    const sp = parseFloat(document.getElementById("sp").value);
    const u = document.getElementById("unit").value;

    if (!p || isNaN(aq) || isNaN(sq) || isNaN(sp)) return;

    const mqv = (aq - sq) * sp;
    const isBad = mqv > 0;
    const diff = Math.abs(aq - sq).toFixed(2);
    const percent = sq !== 0 ? ((Math.abs(aq - sq) / sq) * 100).toFixed(2) : 0;

    // ระบบสุ่มใหม่ทุกครั้งที่กดคำนวณ
    const pool = isBad ? POOL.bad : POOL.good;
    const rTitle = pool.titles[Math.floor(Math.random() * pool.titles.length)];
    const rReason = pool.reasons[Math.floor(Math.random() * pool.reasons.length)];
    const rAdvice = pool.advices[Math.floor(Math.random() * pool.advices.length)];

    const out = document.getElementById("output");
    out.style.display = "block";
    
    out.innerHTML = `
        <div style="font-size:1.1em; margin-bottom:15px;">
            <b>สูตรคำนวณ:</b> (AQ - SQ) × SP | <b>แทนค่า:</b> (${aq} - ${sq}) × ${sp} = 
            <span style="color:${isBad ? 'var(--danger)' : 'var(--success)'}; font-size:1.3em;"><b>${mqv.toLocaleString(undefined, {minimumFractionDigits: 2})}</b></span>
        </div>
        
        <div class="status-badge ${isBad ? 'bad' : 'good'}">${rTitle}</div>

        <div class="analysis-card" style="border-left-color: ${isBad ? 'var(--danger)' : 'var(--success)'}">
            <p><b>1. สรุปผลการปฏิบัติงาน:</b> ผลิตภัณฑ์ <b>"${p}"</b> มีการใช้ทรัพยากรจริง ${isBad ? 'สูง' : 'ต่ำ'}กว่าเป้าหมายที่กำหนดไว้ถึง <b>${diff} ${u}</b> ซึ่งถือเป็นการเบี่ยงเบนทาง${isBad ? 'ลบที่ต้องเฝ้าระวัง' : 'บวกที่น่าประทับใจ'} (คิดเป็น ${percent}%)</p>
            
            <p><b>2. การวิเคราะห์ผลกระทบด้านการเงินอย่างละเอียด:</b> จากการคำนวณพบว่า ความ${isBad ? 'สิ้นเปลือง' : 'ประหยัด'}ในครั้งนี้ส่งผลให้ต้นทุนการผลิต${isBad ? 'พุ่งสูงขึ้นเป็น' : 'ลดลงได้ถึง'}จำนวนเงิน <b>${Math.abs(mqv).toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</b> ซึ่งจะส่งผลกระทบโดยตรงต่ออัตรากำไรขั้นต้น (GP) ของไตรมาสนี้${isBad ? 'อย่างมีนัยสำคัญ' : 'ในเชิงบวก'}</p>
            
            <p><b>3. การวิเคราะห์สาเหตุเชิงลึก:</b> ${rReason}</p>
            
            <p><b>4. ข้อแนะนำและแผนการปฏิบัติงาน:</b> ${rAdvice}</p>
        </div>`;

    updateChart(aq, sq);
}

function updateChart(aq, sq) {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: ['ใช้จริง (AQ)', 'มาตรฐาน (SQ)'],
            datasets: [{ 
                data: [aq, sq], 
                backgroundColor: ['#005f99', '#99ccff'], 
                borderRadius: 8 
            }]
        },
        options: { 
            responsive: true, 
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
}
</script>
</body>
</html>
