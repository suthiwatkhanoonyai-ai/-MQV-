<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f0f8ff;
    margin:0;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{ text-align:center; color:#007acc; }
input,button{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
}
button{
    background:#007acc;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{ background:#005f99; }
.lang-btn{ width:auto; float:right; }
.result,.history{
    background:#e6f2ff;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}
.view-btn{
    background:#005f99;
}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title">การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)</h2>

<label id="l1">ชื่อผลิตภัณฑ์</label>
<input type="text" id="product">

<label id="l2">ปริมาณจริงที่ใช้ (AQ)</label>
<input type="number" id="aq">

<label id="l3">ปริมาณมาตรฐาน (SQ)</label>
<input type="number" id="sq">

<label id="l4">ราคามาตรฐาน (SP)</label>
<input type="number" id="sp">

<label id="l5">หน่วยนับ</label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn">คำนวณ</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle">ประวัติการคำนวณ</h3>
<table id="historyTable">
<tr>
<th>Product</th><th>AQ</th><th>SQ</th><th>SP</th><th>MQV</th><th>View</th>
</tr>
</table>
</div>

</div>

<script>
let chart;
let lang="th";
let historyData=[];
let viewingHistory=false;

// ENTER ไปช่องถัดไป
const inputs=["product","aq","sq","sp","unit"];
inputs.forEach((id,index)=>{
    document.getElementById(id).addEventListener("keydown",function(e){
        if(e.key==="Enter"){
            e.preventDefault();
            if(index<inputs.length-1){
                document.getElementById(inputs[index+1]).focus();
            }else{
                calculate();
            }
        }
    });
});

function toggleLang(){
    lang = lang==="th"?"en":"th";

    document.getElementById("title").innerText =
    lang==="th"?
    "การคำนวณส่วนต่างปริมาณวัตถุดิบ (MQV)":
    "Material Quantity Variance (MQV) Calculator";

    document.getElementById("l1").innerText = lang==="th"?"ชื่อผลิตภัณฑ์":"Product Name";
    document.getElementById("l2").innerText = lang==="th"?"ปริมาณจริงที่ใช้ (AQ)":"Actual Quantity (AQ)";
    document.getElementById("l3").innerText = lang==="th"?"ปริมาณมาตรฐาน (SQ)":"Standard Quantity (SQ)";
    document.getElementById("l4").innerText = lang==="th"?"ราคามาตรฐาน (SP)":"Standard Price (SP)";
    document.getElementById("l5").innerText = lang==="th"?"หน่วยนับ":"Unit";
    document.getElementById("calcBtn").innerText = lang==="th"?"คำนวณ":"Calculate";

    if(document.getElementById("output").innerHTML!==""){
        calculate(true); // re-render language
    }
}

function calculate(skipSave=false){

    const p=document.getElementById("product").value;
    const aq=parseFloat(document.getElementById("aq").value);
    const sq=parseFloat(document.getElementById("sq").value);
    const sp=parseFloat(document.getElementById("sp").value);
    const unit=document.getElementById("unit").value;

    const mqv=(aq-sq)*sp;

    let status = mqv>0 ? "Unfavorable" : mqv<0 ? "Favorable" : "Standard";
    let percent = ((aq-sq)/sq*100).toFixed(2);

    let analysisText="";
    if(mqv>0){
        analysisText = `
${lang==="th"?
`ผลลัพธ์เป็นบวก แสดงว่า ${p} ใช้วัตถุดิบเกินมาตรฐาน ${percent}% ส่งผลให้ต้นทุนเพิ่มขึ้น ${mqv.toFixed(2)} บาท
สาเหตุอาจเกิดจากของเสียสูง กระบวนการผลิตไม่มีประสิทธิภาพ หรือการควบคุมคุณภาพวัตถุดิบไม่ดี
คำแนะนำ: ควรวิเคราะห์อัตราของเสีย ปรับปรุงขั้นตอนการผลิต และควบคุมคุณภาพวัตถุดิบอย่างเข้มงวด`
:
`Positive variance indicates that ${p} consumed ${percent}% more materials than standard, increasing cost by ${mqv.toFixed(2)}.
Possible causes include high waste, inefficient production, or poor material quality.
Recommendation: review waste rate, improve process efficiency, and strengthen quality control.`}
`;
    }else if(mqv<0){
        analysisText = `
${lang==="th"?
`ผลลัพธ์เป็นลบ แสดงว่า ${p} ใช้วัตถุดิบน้อยกว่ามาตรฐาน ${Math.abs(percent)}%
สะท้อนถึงประสิทธิภาพการผลิตที่ดี แต่ควรตรวจสอบว่าไม่ได้ลดคุณภาพสินค้า`
:
`Negative variance indicates ${p} used ${Math.abs(percent)}% less materials than standard.
This reflects good efficiency but ensure product quality is maintained.`}
`;
    }else{
        analysisText = lang==="th"?
        `การใช้วัตถุดิบของ ${p} เป็นไปตามมาตรฐานที่กำหนด`:
        `${p} material usage is exactly on standard`;
    }

    let explanation = `
${lang==="th"?
`คำอธิบายตัวเลข:
AQ (${aq} ${unit}) = ปริมาณจริงที่ใช้
SQ (${sq} ${unit}) = ปริมาณมาตรฐานที่ควรใช้
SP (${sp}) = ราคามาตรฐานต่อหน่วย
สูตร MQV = (AQ - SQ) × SP = ${mqv.toFixed(2)}`
:
`Explanation:
AQ (${aq} ${unit}) = Actual quantity used
SQ (${sq} ${unit}) = Standard quantity allowed
SP (${sp}) = Standard price per unit
MQV = (AQ - SQ) × SP = ${mqv.toFixed(2)}`}
`;

    document.getElementById("output").innerHTML = explanation + "<br><br>" + analysisText;

    if(!skipSave && !viewingHistory){
        saveHistory(p,aq,sq,sp,mqv,unit);
    }

    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{
            labels:['AQ','SQ'],
            datasets:[{
                label:'Quantity Comparison',
                data:[aq,sq],
                backgroundColor:['#007acc','#99ccff']
            }]
        }
    });

    viewingHistory=false;
}

function saveHistory(p,aq,sq,sp,mqv,unit){
    const record={p,aq,sq,sp,mqv,unit};
    historyData.push(record);

    let table=document.getElementById("historyTable");
    let row=table.insertRow();

    row.insertCell(0).innerText=p;
    row.insertCell(1).innerText=aq;
    row.insertCell(2).innerText=sq;
    row.insertCell(3).innerText=sp;
    row.insertCell(4).innerText=mqv.toFixed(2);

    let viewCell=row.insertCell(5);
    let btn=document.createElement("button");
    btn.innerText="View";
    btn.className="view-btn";
    btn.onclick=function(){
        viewingHistory=true;
        loadHistory(record);
    };
    viewCell.appendChild(btn);
}

function loadHistory(r){
    document.getElementById("product").value=r.p;
    document.getElementById("aq").value=r.aq;
    document.getElementById("sq").value=r.sq;
    document.getElementById("sp").value=r.sp;
    document.getElementById("unit").value=r.unit;
    calculate(true);
}

function exportPDF(){
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF();
    doc.text(document.getElementById("output").innerText,10,10);
    doc.save("MQV_Result.pdf");
}

function exportExcel(){
    let table=document.getElementById("historyTable");
    let wb=XLSX.utils.table_to_book(table,{sheet:"MQV"});
    XLSX.writeFile(wb,"MQV_History.xlsx");
}
</script>

</body>
</html>
