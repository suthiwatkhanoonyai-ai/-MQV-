<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQV Professional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f0f8ff;margin:0;padding:20px;}
.container{max-width:1100px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 12px rgba(0,0,0,0.1);}
h2{text-align:center;color:#007acc;}
input,button{width:100%;padding:8px;margin:6px 0;}
button{background:#007acc;color:white;border:none;cursor:pointer;border-radius:6px;}
button:hover{background:#005f99;}
.lang-btn{width:auto;float:right;}
.result,.history{background:#e6f2ff;padding:15px;border-radius:10px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.view-btn{background:#005f99;color:white;border:none;padding:5px;border-radius:4px;}
.status-good{color:green;font-weight:bold;}
.status-bad{color:red;font-weight:bold;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">EN / ไทย</button>
<h2 id="title"></h2>

<label id="l1"></label>
<input type="text" id="product">

<label id="l2"></label>
<input type="number" id="aq">

<label id="l3"></label>
<input type="number" id="sq">

<label id="l4"></label>
<input type="number" id="sp">

<label id="l5"></label>
<input type="text" id="unit">

<button onclick="calculate()" id="calcBtn"></button>

<div class="result" id="output"></div>
<canvas id="chart"></canvas>

<div class="history">
<h3 id="historyTitle"></h3>
<table id="historyTable"></table>
</div>

</div>

<script>

let chart;
let lang="th";
let historyData=[];
let currentRecord=null;

const TEXT={
th:{
title:"การวิเคราะห์ส่วนต่างปริมาณวัตถุดิบ (MQV)",
product:"ชื่อผลิตภัณฑ์",
aq:"ปริมาณจริง (AQ)",
sq:"ปริมาณมาตรฐาน (SQ)",
sp:"ราคามาตรฐาน (SP)",
unit:"หน่วย",
calc:"คำนวณ",
history:"ประวัติการคำนวณ",
headers:["สินค้า","AQ","SQ","SP","MQV","ดูข้อมูล"],
satisfy:"พอใจ",
unsatisfy:"ไม่พอใจ"
},
en:{
title:"Material Quantity Variance (MQV)",
product:"Product",
aq:"Actual Quantity (AQ)",
sq:"Standard Quantity (SQ)",
sp:"Standard Price (SP)",
unit:"Unit",
calc:"Calculate",
history:"Calculation History",
headers:["Product","AQ","SQ","SP","MQV","View"],
satisfy:"Favorable",
unsatisfy:"Unfavorable"
}
};

function applyLanguage(){
title.innerText=TEXT[lang].title;
l1.innerText=TEXT[lang].product;
l2.innerText=TEXT[lang].aq;
l3.innerText=TEXT[lang].sq;
l4.innerText=TEXT[lang].sp;
l5.innerText=TEXT[lang].unit;
calcBtn.innerText=TEXT[lang].calc;
historyTitle.innerText=TEXT[lang].history;
renderHistory();
if(currentRecord) renderResult(currentRecord);
}

function toggleLang(){
lang=lang==="th"?"en":"th";
applyLanguage();
}

function calculate(){

const p=product.value.trim();
const aqVal=parseFloat(aq.value);
const sqVal=parseFloat(sq.value);
const spVal=parseFloat(sp.value);

if(!p||isNaN(aqVal)||isNaN(sqVal)||isNaN(spVal)) return;

const mqv=(aqVal-sqVal)*spVal;

const record={p,aq:aqVal,sq:sqVal,sp:spVal,mqv};

currentRecord=record;
historyData.push(record);

renderResult(record);
renderHistory();
}

function generateAnalysis(){

const p = product.value.trim();
const aqVal = parseFloat(aq.value);
const sqVal = parseFloat(sq.value);
const spVal = parseFloat(sp.value);

if(!p || isNaN(aqVal) || isNaN(sqVal) || isNaN(spVal)) return "";

const mqv = (aqVal - sqVal) * spVal;
const diffPercent = sqVal !== 0 ? ((aqVal - sqVal) / sqVal) * 100 : 0;
const absPercent = Math.abs(diffPercent).toFixed(2);

if(mqv > 0){
return `
<span class="status-bad">${TEXT[lang].unsatisfy}</span><br><br>
${lang==="th"
? `จากผลการคำนวณล่าสุด พบว่า “${p}” มีการใช้วัตถุดิบสูงกว่ามาตรฐาน ${absPercent}% ส่งผลให้เกิดส่วนต่างในทางที่ไม่พึงประสงค์ สะท้อนถึงประสิทธิภาพการควบคุมกระบวนการผลิตที่ยังไม่เหมาะสม ความคลาดเคลื่อนนี้อาจเกิดจากของเสีย การกำหนดมาตรฐานที่ไม่สอดคล้องกับสภาพจริง หรือความผิดพลาดในขั้นตอนการผลิต หากแนวโน้มนี้เกิดขึ้นต่อเนื่อง อาจส่งผลกระทบต่อโครงสร้างต้นทุนและกำไรของกิจการ จึงควรวิเคราะห์สาเหตุเชิงลึกและปรับปรุงมาตรการควบคุมภายใน`
: `The latest calculation indicates that "${p}" consumed ${absPercent}% more material than the standard quantity, resulting in an unfavorable variance. This suggests inefficiencies in production control, possible waste, unrealistic standards, or operational weaknesses. Continuous occurrence may negatively impact cost structure and profitability. A detailed operational review is recommended.`}
`;
}
else if(mqv < 0){
return `
<span class="status-good">${TEXT[lang].satisfy}</span><br><br>
${lang==="th"
? `ผลการวิเคราะห์แสดงให้เห็นว่า “${p}” ใช้วัตถุดิบต่ำกว่ามาตรฐาน ${absPercent}% ส่งผลให้เกิดส่วนต่างในทางที่พึงประสงค์ สะท้อนถึงการควบคุมการผลิตที่มีประสิทธิภาพและการใช้ทรัพยากรอย่างเหมาะสม อย่างไรก็ตาม ควรติดตามผลอย่างต่อเนื่องเพื่อรักษาระดับประสิทธิภาพนี้`
: `The analysis shows that "${p}" used ${absPercent}% less material than the standard quantity, resulting in a favorable variance. This reflects strong production control and efficient resource utilization. Continuous monitoring is advised to sustain this performance.`}
`;
}
else{
return `
<span class="status-good">${TEXT[lang].satisfy}</span><br><br>
${lang==="th"
? `การใช้วัตถุดิบของ “${p}” เป็นไปตามมาตรฐานที่กำหนดอย่างแม่นยำ ไม่พบความคลาดเคลื่อน แสดงถึงความมีเสถียรภาพของกระบวนการผลิตและการควบคุมต้นทุน`
: `Material usage for "${p}" aligns exactly with the defined standard. No variance is observed, indicating stable operations and accurate cost control.`}
`;
}
}

function renderResult(record){

const {aq,sq,sp,mqv}=record;

output.innerHTML=`
AQ = ${aq}<br>
SQ = ${sq}<br>
SP = ${sp}<br><br>
(AQ - SQ) × SP = <b>${mqv.toFixed(2)}</b><br><br>
${generateAnalysis()}
`;

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['AQ','SQ'],
datasets:[{data:[aq,sq],backgroundColor:['#007acc','#99ccff']}]
},
options:{responsive:true,plugins:{legend:{display:false}}}
});
}

function renderHistory(){
let table=historyTable;
table.innerHTML="";
let header=table.insertRow();
TEXT[lang].headers.forEach(h=>{
let cell=header.insertCell();
cell.innerText=h;
});
historyData.forEach(r=>{
let row=table.insertRow();
row.insertCell().innerText=r.p;
row.insertCell().innerText=r.aq;
row.insertCell().innerText=r.sq;
row.insertCell().innerText=r.sp;
row.insertCell().innerText=r.mqv.toFixed(2);
let btnCell=row.insertCell();
let btn=document.createElement("button");
btn.className="view-btn";
btn.innerText=TEXT[lang].headers[5];
btn.onclick=function(){
product.value=r.p;
aq.value=r.aq;
sq.value=r.sq;
sp.value=r.sp;
currentRecord=r;
renderResult(r);
};
btnCell.appendChild(btn);
});
}

applyLanguage();

</script>
</body>
</html>
